// ── Persistence ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    if (!sb) {
      if (typeof window.supabase !== 'undefined') {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } else {
        // Retry up to 5 times with 1 second delay
        let retries = 0;
        const retry = async () => {
          await new Promise(r => setTimeout(r, 1000));
          if (typeof window.supabase !== 'undefined') {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          } else if (retries++ < 5) {
            return retry();
          } else {
            showToast('Could not connect to cloud — check internet and reload');
            return;
          }
        };
        await retry();
        if (!sb) return;
      }
    }

    // Load intakes
    const {data: intakeRows} = await sb.from('intakes').select('*');
    if (intakeRows && intakeRows.length) {
      intakes = intakeRows.map(r => r.data);
    }

    // Load deliveries
    const {data: deliveryRows} = await sb.from('deliveries').select('*');
    if (deliveryRows && deliveryRows.length) {
      deliveries = deliveryRows.filter(r => !r.data._type).map(r => r.data);
      dailyRecords = deliveryRows.filter(r => r.data._type === 'daily').map(r => r.data);
    }

    // Load config (estates, processors, parts, species)
    const {data: configRows} = await sb.from('app_config').select('*');
    if (configRows) {
      for (const row of configRows) {
        if (row.key === 'daily_records') dailyRecords = row.data || [];
        if (row.key === 'estates' && row.data.length) estates = row.data;
        if (row.key === 'processors' && row.data.length) processors = row.data;
        if (row.key === 'parts' && row.data.length) parts = row.data;
        if (row.key === 'species' && row.data.length) species = row.data;
      }
    }

    // Migration: if Supabase empty, check localStorage
    if (intakes.length === 0) {
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) {
          const d = JSON.parse(raw);
          if (d.intakes && d.intakes.length) {
            intakes = d.intakes;
            deliveries = d.deliveries || [];
            estates = d.estates || [];
            processors = d.processors || [];
            if (d.parts && d.parts.length) parts = d.parts;
            if (d.species && d.species.length) species = d.species;
            showToast('Migrating local records to cloud...');
            await saveData();
            return;
          }
        }
      } catch(e) {}
    }

    if (intakes.length) showToast(`${intakes.length} record${intakes.length>1?'s':''} · ${estates.length} estate${estates.length!==1?'s':''} · ${processors.length} processor${processors.length!==1?'s':''} loaded`);
  } catch(e) {
    console.error('Load error', e);
    showToast('Could not connect to cloud — check internet connection');
  }
}

async function saveData() {
  try {
    showStatus('saving');

    // Save all intakes
    for (const intake of intakes) {
      await sb.from('intakes').upsert({id: intake.id, data: intake});
    }

    // Save all deliveries
    for (const delivery of deliveries) {
      await sb.from('deliveries').upsert({id: delivery.id, data: delivery});
    }

    // Save config
    await sb.from('app_config').upsert({key: 'estates', data: estates});
    await sb.from('app_config').upsert({key: 'processors', data: processors});
    await sb.from('app_config').upsert({key: 'parts', data: parts});
    await sb.from('app_config').upsert({key: 'species', data: species});
    // Save daily records
    for (const dr of dailyRecords) {
      await sb.from('deliveries').upsert({id: 'daily_' + dr.id, data: {...dr, _type: 'daily'}});
    }

    showStatus('saved');
  } catch(e) {
    console.error('Save error', e);
    showStatus('error');
    showToast('Cloud save failed — check internet connection');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };
const today = () => new Date().toISOString().split('T')[0];

function seasonCode(dateStr) {
  // Sept-Dec: season opens THIS year. Jan-Feb: opened LAST year. Mar-Aug: new season opens THIS year.
  const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
  const y = d.getFullYear(), m = d.getMonth() + 1;
  const openYear = (m >= 9) ? y : (m <= 2) ? y - 1 : y;
  const closeYY = String(openYear + 1).slice(-2);
  return `${openYear}${closeYY}`;
}

function fmtSeason(c) {
  return c && c.length === 6 ? c.slice(0,4) + '/' + c.slice(4) : c;
}

function nextNum(season, list) {
  // Match by batchCode prefix — robust against mismatched season fields
  const prefix = season + '-';
  const rel = (list||[]).filter(i => i.batchCode && i.batchCode.startsWith(prefix));
  if (!rel.length) return 1;
  const nums = rel.map(i => parseInt(i.batchCode.slice(prefix.length)) || 0);
  return Math.max(...nums) + 1;
}

function migrateShortCodes() {
  // Fix any records saved with truncated 4-digit season codes e.g. 2526 → 202526
  let changed = false;
  intakes = intakes.map(r => {
    if (r.season && r.season.length === 4) {
      const fullSeason = '20' + r.season;
      const fixedCode = (r.batchCode||'').startsWith(r.season + '-')
        ? fullSeason + '-' + r.batchCode.slice(r.season.length + 1)
        : r.batchCode;
      changed = true;
      return {...r, season: fullSeason, batchCode: fixedCode};
    }
    return r;
  });
  if (changed) saveData();
}

function seasonFromBatch(batchCode) {
  // Extract season from batch code e.g. 202526-3 → 202526
  const parts = (batchCode||'').split('-');
  const s = parts[0];
  return s.length === 6 ? s : null;
}

function describeSeason(code) {
  // 202526 → "Sept 2025 – Jan 2026"
  if (!code || code.length !== 6) return '';
  const openYear = code.slice(0,4);
  const closeYY = code.slice(4);
  const closeYear = '20' + closeYY;
  return `Sept ${openYear} – Jan ${closeYear}`;
}

function tempOk(item) {
  const t = parseFloat(item.temp);
  if (isNaN(t)) return null;
  return item.storage === 'Chilled' ? t <= 4 : t <= -18;
}

function getName(list, id) {
  const x = list.find(i => i.id === id);
  return x ? x.name : '—';
}

function newItem() {
  return { id: uid(), species: 'Pheasant', custom: '', part: parts[0]||'', storage: 'Chilled', qty: '', unit: 'kg', temp: '', pkg: 'Pass' };
}

function blankForm() {
  const c = seasonCode(today());
  const n = nextNum(c, intakes);
  return { date: today(), season: c, batchCode: `${c}-${n}`, batchOverride: false, estateId: '', processorId: '', ref: '', items: [newItem()], notes: '' };
}

function checkDups(f, eid) {
  const w = [], o = intakes.filter(r => r.id !== eid);
  if (f.batchCode && o.some(r => r.batchCode === f.batchCode)) w.push(`Batch code ${f.batchCode} already exists.`);
  if (f.date && f.estateId && f.processorId) {
    const c = o.find(r => r.date === f.date && r.estateId === f.estateId && r.processorId === f.processorId);
    if (c) w.push(`Same estate & processor already recorded on ${f.date} (${c.batchCode}).`);
  }
  if (f.ref && f.ref.trim() && o.some(r => r.ref && r.ref.trim() === f.ref.trim() && r.date === f.date))
    w.push(`Processor ref "${f.ref}" already used on ${f.date}.`);
  return w;
}

// ── Toast & status ────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

function showStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  if (s === 'saving') el.innerHTML = `<span class="dot dot-grey"></span> Saving...`;
  else if (s === 'saved') el.innerHTML = `<span class="dot dot-green"></span> Saved to cloud`;
  else if (s === 'error') el.innerHTML = `<span class="dot dot-red"></span> Save failed`;
  if (s !== 'saving') {
    clearTimeout(saveStatusTimer);
    saveStatusTimer = setTimeout(() => { if(el) el.innerHTML = `<span class="dot dot-grey"></span> Auto-saves to cloud`; }, 3000);
  }
}

// ── Render helpers ────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function div(cls, ...children) { return el('div', {className: cls}, ...children); }
function p(cls, text) { const e = document.createElement('p'); e.className = cls||''; e.textContent = text||''; return e; }
function span(cls, text) { const e = document.createElement('span'); e.className = cls||''; e.textContent = text||''; return e; }
function label(text, forId) { const e = document.createElement('label'); e.textContent = text; if(forId) e.htmlFor = forId; return e; }
function input(attrs) { return el('input', attrs); }
function select(opts, val, onChange) {
  const s = document.createElement('select');
  for (const [v,t] of opts) { const o = document.createElement('option'); o.value = v; o.textContent = t; if(v===val) o.selected=true; s.appendChild(o); }
  s.addEventListener('change', e => onChange(e.target.value));
  return s;
}
function btn(cls, text, onClick) { const b = document.createElement('button'); b.className = cls; b.textContent = text; b.addEventListener('click', onClick); return b; }

// ── Dropdown component ────────────────────────────────────────────────────────
function makeDropdown(container, labelText, entities, selectedId, onSelect, onAdd, hasFSA) {
  container.innerHTML = '';
  const lbl = document.createElement('label');
  lbl.textContent = labelText; lbl.style.cssText = 'font-size:12px;color:#666;display:block;margin-bottom:4px;';
  container.appendChild(lbl);

  const row = div('row');
  const sel = document.createElement('select');
  sel.style.flex = '1';
  const blank = document.createElement('option'); blank.value = ''; blank.textContent = `— select ${labelText.toLowerCase()} —`; sel.appendChild(blank);
  for (const e of entities) { const o = document.createElement('option'); o.value = e.id; o.textContent = e.name + (hasFSA && e.fsa ? ` (FSA: ${e.fsa})` : hasFSA ? ' (no FSA)' : ''); if(e.id===selectedId) o.selected=true; sel.appendChild(o); }
  sel.addEventListener('change', e => { onSelect(e.target.value); renderFSAHint(); });
  row.appendChild(sel);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-link'; addBtn.textContent = '+ Add new';
  addBtn.addEventListener('click', () => { subForm.style.display = subForm.style.display==='none'?'block':'none'; });
  row.appendChild(addBtn);
  container.appendChild(row);

  const hint = p('storage-note','');
  const renderFSAHint = () => {
    if (!hasFSA) return;
    const found = entities.find(e => e.id === sel.value);
    hint.textContent = found ? `FSA: ${found.fsa||'not registered'}` : '';
  };
  renderFSAHint();
  container.appendChild(hint);

  const subForm = div('sub-form'); subForm.style.display = 'none';
  const nameInput = input({type:'text', placeholder: labelText + ' name', style:'margin-bottom:8px;'});
  subForm.appendChild(nameInput);
  let fsaInput;
  if (hasFSA) {
    fsaInput = input({type:'text', placeholder:'FSA number (leave blank if none)', style:'margin-bottom:8px;'});
    subForm.appendChild(fsaInput);
  }
  const saveBtn = btn('btn-primary btn-sm', `Save ${labelText.toLowerCase()}`, () => {
    const name = nameInput.value.trim();
    if (!name) return;
    const entry = {id: uid(), name, fsa: hasFSA ? (fsaInput.value.trim()||'') : undefined};
    onAdd(entry);
    nameInput.value = ''; if(fsaInput) fsaInput.value = '';
    subForm.style.display = 'none';
    showToast(`${labelText} "${name}" saved`);
    saveData();
  });
  const cancelBtn = btn('', 'Cancel', () => { subForm.style.display = 'none'; nameInput.value = ''; if(fsaInput) fsaInput.value=''; });
  cancelBtn.style.marginLeft = '8px';
  subForm.appendChild(el('div', {}, saveBtn, cancelBtn));
  container.appendChild(subForm);
}

  cardTitle.textContent = titleText;
  const cardCount = document.createElement('span');
  cardCount.style.cssText = 'font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;background:' + bgColor + ';color:' + textColor + ';';
  cardCount.textContent = doneCount + ' / ' + checks.length + ' done';
  cardHeader.appendChild(cardTitle);
  cardHeader.appendChild(cardCount);
  card.appendChild(cardHeader);
  checks.forEach(check => {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid #f5f5f2;';
    const tickEl = document.createElement('span');
    const ticked = state && state[check];
    tickEl.style.cssText = 'font-size:14px;color:' + (ticked ? '#3a6b2a' : '#ddd') + ';flex-shrink:0;margin-top:1px;';
    tickEl.textContent = ticked ? '✓' : '○';
    const lblEl = document.createElement('span');
    lblEl.style.cssText = 'font-size:12px;color:' + (ticked ? '#1a1a1a' : '#aaa') + ';line-height:1.4;';
    lblEl.textContent = check;
    rowEl.appendChild(tickEl);
    rowEl.appendChild(lblEl);
    card.appendChild(rowEl);
  });
  return card;
}

function renderDailyForm2(step) {

  if (step === 'daytype') renderStepDayType(formEl);

// ── STEP: Start of day ────────────────────────────────────────────────────────
function renderStepStart(container) {
  const dt = DAY_TYPES.find(d => d.id === dailyForm.dayTypeId);
  buildStepHeader(container, dt.icon + ' ' + dt.label, fmtDate(dailyForm.date), 'start');

  if (dailyForm.dayTypeId === 'monitor') {
    const noteEl = document.createElement('p');
    noteEl.style.cssText = 'font-size:12px;color:#888;margin-bottom:10px;';
    noteEl.textContent = 'All items ticked by default - untick anything that does not apply today.';
    container.appendChild(noteEl);

    const monSection = document.createElement('div');
    monSection.className = 'check-section';
    const monTitle = document.createElement('p'); monTitle.className = 'check-section-title'; monTitle.textContent = 'Monitor checks';
    monSection.appendChild(monTitle);

    if (!dailyForm.monitorChecks) {
      dailyForm.monitorChecks = {};
      MONITOR_CHECKS.forEach(c => { dailyForm.monitorChecks[c] = true; });
    }

    MONITOR_CHECKS.forEach(check => {
      const rowEl = document.createElement('div'); rowEl.className = 'check-item';
      const chkEl = document.createElement('input'); chkEl.type = 'checkbox';
      chkEl.checked = dailyForm.monitorChecks[check] !== false;
      chkEl.addEventListener('change', ev => { dailyForm.monitorChecks[check] = ev.target.checked; });
      const lblEl = document.createElement('label'); lblEl.textContent = check;
      rowEl.appendChild(chkEl); rowEl.appendChild(lblEl);
      monSection.appendChild(rowEl);
    });
    container.appendChild(monSection);

    // Notes box
    const monNotesCard = document.createElement('div');
    monNotesCard.className = 'card';
    const monNotesLbl = document.createElement('label');
    monNotesLbl.style.cssText = 'font-size:12px;color:#666;display:block;margin-bottom:4px;';
    monNotesLbl.textContent = 'Notes for today';
    monNotesCard.appendChild(monNotesLbl);
    const monNotesArea = document.createElement('textarea');

    monNotesArea.placeholder = 'Any observations from today...';
    monNotesArea.addEventListener('input', ev => { dailyForm.monitorNotes = ev.target.value; });
    monNotesCard.appendChild(monNotesArea);
    container.appendChild(monNotesCard);

    // To-do list
    if (!dailyForm.todoList) dailyForm.todoList = [];
    const todoCard = document.createElement('div');
    todoCard.className = 'card';
    const todoTitleEl = document.createElement('p');
    todoTitleEl.style.cssText = 'font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:10px;';
    todoTitleEl.textContent = 'To-do list';
    todoCard.appendChild(todoTitleEl);

    const todoItemsEl = document.createElement('div');
    todoCard.appendChild(todoItemsEl);

    function refreshTodo() {
      todoItemsEl.innerHTML = '';
      const openTasks = dailyForm.todoList.filter(t => !t.done);
      const doneTasks = dailyForm.todoList.filter(t => t.done);

      if (openTasks.length === 0 && doneTasks.length === 0) {
        const emEl = document.createElement('p');
        emEl.style.cssText = 'font-size:12px;color:#aaa;margin-bottom:8px;';
        emEl.textContent = 'No tasks yet';
        todoItemsEl.appendChild(emEl);
      }

      openTasks.forEach(task => {
        const taskRow = document.createElement('div');
        taskRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0ee;';
        const taskChk = document.createElement('input'); taskChk.type = 'checkbox';
        taskChk.style.cssText = 'width:18px;height:18px;accent-color:#3a6b2a;cursor:pointer;flex-shrink:0;margin-top:2px;';
        taskChk.addEventListener('change', () => { task.done = true; task.doneDate = today(); refreshTodo(); });
        const taskTextEl = document.createElement('span');
        taskTextEl.style.cssText = 'font-size:13px;flex:1;line-height:1.4;';
        taskTextEl.textContent = task.text;
        const addedEl = document.createElement('span');
        addedEl.style.cssText = 'font-size:10px;color:#aaa;white-space:nowrap;';
        addedEl.textContent = fmtDate(task.addedDate);
        taskRow.appendChild(taskChk); taskRow.appendChild(taskTextEl); taskRow.appendChild(addedEl);
        todoItemsEl.appendChild(taskRow);
      });

      if (doneTasks.length > 0) {
        const doneLblEl = document.createElement('p');

  function renderSelectedBatches() {
    selectedBatchesDiv.innerHTML = '';
    if (dform.batchCodes.length === 0) {
      selectedBatchesDiv.appendChild(p('muted', 'No batch codes added yet'));
    } else {
      for (const bc of dform.batchCodes) {

          dform.batchCodes = dform.batchCodes.filter(x => x !== bc);
          renderSelectedBatches();
        });
        rem.style.cssText = 'background:none;border:none;color:#c0392b;cursor:pointer;padding:0 0 0 4px;font-size:14px;';

  }
  renderSelectedBatches();
  batchCard.appendChild(selectedBatchesDiv);

  // Estate filter for batches
  const filterRow = div('row'); filterRow.style.marginBottom = '8px';
  const filterLbl = el('span', {style:'font-size:12px;color:#666;white-space:nowrap;'}, 'Filter by estate:');
  const batchFilterSel = document.createElement('select'); batchFilterSel.style.flex = '1';
  const allOpt = document.createElement('option'); allOpt.value = ''; allOpt.textContent = '— all estates —'; batchFilterSel.appendChild(allOpt);
  for (const e of estates) {
    const o = document.createElement('option'); o.value = e.id; o.textContent = e.name;
    if (e.id === dform.clientId) o.selected = true;
    batchFilterSel.appendChild(o);
  }
  filterRow.appendChild(filterLbl); filterRow.appendChild(batchFilterSel);
  batchCard.appendChild(filterRow);

  // Search input
  const batchSearchInp = input({type:'text', placeholder:'Type to search batch codes...'});
  batchCard.appendChild(batchSearchInp);

  // Results list
  const batchResults = div('batch-search-results'); batchResults.style.display = 'none';
  batchCard.appendChild(batchResults);

  function filterBatches() {
    const estFilter = batchFilterSel.value;
    const query = batchSearchInp.value.trim().toLowerCase();
    let filtered = intakes;
    if (estFilter) filtered = filtered.filter(i => i.estateId === estFilter);
    if (query) filtered = filtered.filter(i => i.batchCode && i.batchCode.toLowerCase().includes(query));
    filtered = filtered.filter(i => !dform.batchCodes.includes(i.batchCode));
    filtered = [...filtered].reverse().slice(0, 30);

    if (filtered.length === 0 && !query) { batchResults.style.display = 'none'; return; }
    batchResults.style.display = 'block';
    batchResults.innerHTML = '';
    for (const intake of filtered) {

// ── WET MEAT SUMMARY ─────────────────────────────────────────────────────────
function renderWetMeat() {
  currentView = 'wetmeat';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  const v = document.getElementById('view-wetmeat');
  v.style.display = 'block';
  v.innerHTML = '';
  renderTabs('wetmeat');

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:16px;font-weight:600;margin:0;'}, 'Wet meat received'));
  hdr.appendChild(p('muted', 'Kilos received at intake by season and species'));
  v.appendChild(hdr);

  if (intakes.length === 0) {
    v.appendChild(p('muted', 'No intake records yet.'));
    return;
  }

  // Build summary: { season: { species: totalKg } }
  const summary = {};
  for (const record of intakes) {
    const s = record.season || 'Unknown';
    if (!summary[s]) summary[s] = {};
    for (const item of (record.items || [])) {
      const sp = item.species === 'Other' ? (item.custom || 'Other') : item.species;
      const kg = item.unit === 'kg' ? parseFloat(item.qty) || 0 : 0;
      summary[s][sp] = (summary[s][sp] || 0) + kg;
    }
  }

  // Sort seasons newest first
  const seasons = Object.keys(summary).sort().reverse();

  for (const season of seasons) {
    // Season header
    const seasonDesc = describeSeason(season) || fmtSeason(season) || season;
    const hdrEl = div('wm-season-header');
    hdrEl.textContent = seasonDesc;
    v.appendChild(hdrEl);

    // Table
    const table = document.createElement('table');
    table.className = 'wm-table';
    table.style.borderRadius = '0 0 8px 8px';
    table.style.overflow = 'hidden';
    const thead = document.createElement('thead');
    const hrow = document.createElement('tr');
    for (const h of ['Species', 'Total kg received']) {
      const th = document.createElement('th');
      th.textContent = h; hrow.appendChild(th);
    }
    thead.appendChild(hrow); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const speciesData = summary[season];
    const speciesList = Object.keys(speciesData).sort();
    let total = 0;

    for (const sp of speciesList) {
      const kg = speciesData[sp];
      total += kg;
      const row = document.createElement('tr');
      const tdSp = document.createElement('td'); tdSp.textContent = sp;
      const tdKg = document.createElement('td'); tdKg.textContent = kg % 1 === 0 ? `${kg} kg` : `${kg.toFixed(2)} kg`;
      row.appendChild(tdSp); row.appendChild(tdKg);
      tbody.appendChild(row);
    }

    // Total row
    const totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    const tdTotalLbl = document.createElement('td'); tdTotalLbl.textContent = 'Total';
    const tdTotalKg = document.createElement('td'); tdTotalKg.textContent = total % 1 === 0 ? `${total} kg` : `${total.toFixed(2)} kg`;
    totalRow.appendChild(tdTotalLbl); totalRow.appendChild(tdTotalKg);
    tbody.appendChild(totalRow);

    table.appendChild(tbody);
    v.appendChild(table);
  }
}

// ── FORM VIEW ─────────────────────────────────────────────────────────────────
function renderForm() {
  currentView = 'form';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  const v = document.getElementById('view-form');
  v.style.display = 'block';
  v.innerHTML = '';

  let confirmMode = false;

  // Back button + title
  const hdr = div('header-bar');
  const backBtn = btn('back-btn', '← All intakes', () => { form = null; editId = null; renderList(); });
  hdr.appendChild(backBtn);
  const titleEl = el('h2', {}, editId ? `Edit ${form.batchCode}` : 'New intake record');
  titleEl.style.margin = '0';
  hdr.appendChild(titleEl);
  const statusEl = el('span', {id:'save-status', className:'status muted'});
  statusEl.innerHTML = `<span class="dot dot-grey"></span> Auto-saves here`;
  hdr.appendChild(statusEl);
  v.appendChild(hdr);

  // ── Header card ──
  const hcard = div('card');
  const grid = div('grid2');

  // Date
  // ── Season dropdown ──────────────────────────────────────────────────────────
  // Build list of seasons: 3 years back, current, 2 ahead
  function buildSeasons() {
    const now = new Date();
    const curYear = now.getFullYear();
    const seasons = [];
    for (let openYear = curYear - 3; openYear <= curYear + 2; openYear++) {
      const closeYear = openYear + 1;
      const code = `${openYear}${String(closeYear).slice(-2)}`;
      const label = `Spring, Summer & Autumn ${openYear} through to Season End 1 Feb ${closeYear}`;
      seasons.push({code, label});
    }
    return seasons;
  }
  const seasonList = buildSeasons();

  // Date field
  const dateField = div('field span2');
  dateField.appendChild(label('Date of delivery'));
  const dateInput = input({type:'date', value: form.date});
  dateInput.addEventListener('change', e => {
    form.date = e.target.value;
    const c = seasonCode(form.date);
    form.season = c;
    seasonSel.value = c;
    updateBatchDisplay();
  });
  dateField.appendChild(dateInput);
  grid.appendChild(dateField);

  // Season dropdown
  const seasonField = div('field span2');
  seasonField.appendChild(label('Season'));
  const seasonSel = document.createElement('select');
  seasonSel.style.width = '100%';
  // Add options
  for (const s of seasonList) {
    const o = document.createElement('option');
    o.value = s.code;
    o.textContent = s.label;
    if (s.code === form.season) o.selected = true;
    seasonSel.appendChild(o);
  }
  // If current season not in list, add it
  if (!seasonList.find(s => s.code === form.season)) {
    const o = document.createElement('option');
    o.value = form.season;
    o.textContent = `Season ${fmtSeason(form.season)} (imported)`;
    o.selected = true;
    seasonSel.insertBefore(o, seasonSel.firstChild);
  }
  seasonSel.addEventListener('change', e => {
    form.season = e.target.value;
    updateBatchDisplay();
  });
  seasonField.appendChild(seasonSel);
  grid.appendChild(seasonField);

  // Batch number input + generated code display
  const batchField = div('field span2');
  batchField.appendChild(label('Intake batch number for this season'));

  // Extract just the number from existing batchCode
  const existingNum = form.batchCode ? (form.batchCode.split('-')[1] || '') : '';
  const batchNumInput = input({type:'number', value: existingNum, placeholder: `Next: ${nextNum(form.season, intakes)}`, style:'font-size:16px;font-weight:600;width:120px;'});

  const batchDisplay = div('');
  batchDisplay.style.cssText = 'margin-top:8px;padding:10px 14px;background:#f0f7ee;border:1px solid #b8d9b0;border-radius:8px;display:flex;align-items:center;gap:10px;';
  const batchLabel = el('span', {style:'font-size:12px;color:#666;'}, 'Generated batch code:');
  const batchCode = el('span', {style:'font-family:monospace;font-size:20px;font-weight:700;color:#3a6b2a;letter-spacing:2px;'}, form.batchCode || '—');
  batchDisplay.appendChild(batchLabel);
  batchDisplay.appendChild(batchCode);

  function updateBatchDisplay() {
    const num = batchNumInput.value.trim();
    const season = form.season;
    if (num && season) {
      const code = `${season}-${num}`;
      form.batchCode = code;
      batchCode.textContent = code;
      batchDisplay.style.borderColor = '#b8d9b0';
    } else if (!num) {
      const autoNum = nextNum(season, intakes);
      batchCode.textContent = `${season}-${autoNum} (auto)`;
      form.batchCode = `${season}-${autoNum}`;
      batchDisplay.style.borderColor = '#ddd';
    }
  }

  batchNumInput.addEventListener('input', updateBatchDisplay);
  updateBatchDisplay();

  batchField.appendChild(batchNumInput);
  batchField.appendChild(batchDisplay);
  batchField.appendChild(p('muted', 'Just enter the number — the full batch code is generated above'));
  grid.appendChild(batchField);

  // Estate
  const estateContainer = div('span2');
  grid.appendChild(estateContainer);
  makeDropdown(estateContainer, 'Estate', estates, form.estateId,
    id => { form.estateId = id; },
    entry => { estates.push(entry); form.estateId = entry.id; makeDropdown(estateContainer,'Estate',estates,form.estateId,id=>form.estateId=id,entry=>{estates.push(entry);form.estateId=entry.id;saveData();},false); },
    false
  );

  // Processor
  const procContainer = div('span2');
  grid.appendChild(procContainer);
  makeDropdown(procContainer, 'Processor', processors, form.processorId,
    id => { form.processorId = id; },
    entry => { processors.push(entry); form.processorId = entry.id; makeDropdown(procContainer,'Processor',processors,form.processorId,id=>form.processorId=id,entry=>{processors.push(entry);form.processorId=entry.id;saveData();},true); saveData(); },
    true
  );

  // Ref
  const refField = div('field span2');
  refField.appendChild(label('Processor batch ref / identifier'));
  const refInput = input({type:'text', value: form.ref, placeholder:"Processor's own tag, label, or reference number"});
  refInput.addEventListener('input', e => form.ref = e.target.value);
  refField.appendChild(refInput);
  grid.appendChild(refField);

  hcard.appendChild(grid);
  v.appendChild(hcard);

  // ── Items ──
  const itemsTitle = p('section-title', 'Items in this delivery');
  v.appendChild(itemsTitle);
  const itemsContainer = div('');
  v.appendChild(itemsContainer);

  function renderItems() {
    itemsContainer.innerHTML = '';
    form.items.forEach((item, idx) => {
      const icard = div('card');
      const itop = div('row-sb'); itop.style.marginBottom = '12px';
      itop.appendChild(el('span', {className:'muted'}, `Item ${idx+1}`));
      if (form.items.length > 1) {
        const xb = btn('btn-sm btn-danger', '✕ Remove', () => { form.items = form.items.filter(x=>x.id!==item.id); renderItems(); });
        itop.appendChild(xb);
      }
      icard.appendChild(itop);

      const igrid = div('grid2');

      // Species
      const specField = div('field');
      specField.appendChild(label('Species'));
      const specOpts = species.map(s => [s, s==='Other'?'Other (type below)':s]);
      const specSel = select(specOpts, item.species, v => { item.species = v; renderItems(); });
      specField.appendChild(specSel);
      igrid.appendChild(specField);

      if (item.species === 'Other') {
        const custField = div('field');
        custField.appendChild(label('Species name'));
        const custInput = input({type:'text', value: item.custom, placeholder:'Type species name'});
        custInput.addEventListener('input', e => item.custom = e.target.value);
        custField.appendChild(custInput);
        igrid.appendChild(custField);
      } else {
        igrid.appendChild(div(''));
      }

      // Part / cut
      const partContainer = div('field span2');
      partContainer.appendChild(label('Part / cut / description'));
      const partRow = div('row');
      const partSel = document.createElement('select'); partSel.style.flex='1';
      for (const p of parts) { const o = document.createElement('option'); o.value=p; o.textContent=p; if(p===item.part) o.selected=true; partSel.appendChild(o); }
      partSel.addEventListener('change', e => item.part = e.target.value);
      partRow.appendChild(partSel);
      const addPartBtn = btn('add-link', '+ Add new', () => { addPartForm.style.display = addPartForm.style.display==='none'?'block':'none'; });
      partRow.appendChild(addPartBtn);
      partContainer.appendChild(partRow);
      const addPartForm = div('sub-form'); addPartForm.style.display='none';
      const partNameInput = input({type:'text', placeholder:'e.g. Crown, Rack, Offal...'});
      partNameInput.style.marginBottom='8px';
      addPartForm.appendChild(partNameInput);
      const savePartBtn = btn('btn-primary btn-sm','Save & select', () => {
        const name = partNameInput.value.trim();
        if (!name) return;
        if (!parts.includes(name)) parts.push(name);
        item.part = name;
        saveData();
        addPartForm.style.display='none';
        partNameInput.value='';
        renderItems();
      });
      addPartForm.appendChild(savePartBtn);
      partContainer.appendChild(addPartForm);
      igrid.appendChild(partContainer);

      // Storage toggle
      const storField = div('field');
      storField.appendChild(label(`Storage · limit: ${item.storage==='Chilled'?'≤4°C':'≤-18°C'}`));
      const storRow = div('row');
      for (const s of ['Chilled','Frozen']) {
        const b = btn(`toggle-btn${item.storage===s?' active':''}`, s, () => {
          item.storage = s;
          renderItems();
        });
        storRow.appendChild(b);
      }
      storField.appendChild(storRow);
      igrid.appendChild(storField);

      // Temp
      const tempField = div('field');
      tempField.appendChild(label('Core temp at intake (°C)'));
      const tempRow = div('row');
      const tempInput = input({type:'number', step:'0.1', value: item.temp, style:'width:90px;'});
      tempInput.addEventListener('input', e => {
        item.temp = e.target.value;
        const ok = tempOk(item);
        tempBadge.textContent = ok===true?'✓ Pass':ok===false?'✗ FAIL':'';
        tempBadge.className = 'tag ' + (ok===true?'tag-pass':ok===false?'tag-fail':'tag-pending');
        tempBadge.style.display = ok===null?'none':'inline-block';
      });
      tempRow.appendChild(tempInput);
      const ok = tempOk(item);
      const tempBadge = el('span', {className:`tag ${ok===true?'tag-pass':ok===false?'tag-fail':'tag-pending'}`}, ok===true?'✓ Pass':ok===false?'✗ FAIL':'');
      tempBadge.style.display = ok===null?'none':'inline-block';
      tempRow.appendChild(tempBadge);
      tempField.appendChild(tempRow);
      igrid.appendChild(tempField);

      // Qty
      const qtyField = div('field');
      qtyField.appendChild(label('Quantity'));
      const qtyRow = div('row');
      const qtyInput = input({type:'number', value: item.qty, placeholder:'Amount', style:'flex:2;'});
      qtyInput.addEventListener('input', e => item.qty = e.target.value);
      const unitSel = select([['kg','kg'],['pcs','pcs']], item.unit, v => item.unit = v);
      unitSel.style.cssText='flex:1;min-width:60px;';
      qtyRow.appendChild(qtyInput); qtyRow.appendChild(unitSel);
      qtyField.appendChild(qtyRow);
      igrid.appendChild(qtyField);

      // Packaging
      const pkgField = div('field');
      pkgField.appendChild(label('Packaging'));
      const pkgRow = div('row');
      for (const s of ['Pass','Fail','Note']) {
        const b = btn(`pkg-btn${item.pkg===s?' '+s.toLowerCase():''}`, s, () => {
          item.pkg = s;
          renderItems();
        });
        pkgRow.appendChild(b);
      }
      pkgField.appendChild(pkgRow);
      igrid.appendChild(pkgField);

      icard.appendChild(igrid);
      itemsContainer.appendChild(icard);
    });

    const addItemBtn = btn('add-link', '+ Add another item', () => { form.items.push(newItem()); renderItems(); });
    addItemBtn.style.marginBottom = '1.5rem';
    itemsContainer.appendChild(addItemBtn);
  }

  renderItems();

  // Notes
  const notesCard = div('card');
  notesCard.appendChild(label('Notes for this delivery'));
  const notesInput = document.createElement('textarea');
  notesInput.rows = 3; notesInput.value = form.notes;
  notesInput.placeholder = 'Any observations, issues, or extra info...';
  notesInput.addEventListener('input', e => form.notes = e.target.value);
  notesCard.appendChild(notesInput);
  v.appendChild(notesCard);

  // Duplicate warning container
  const warnContainer = div('');
  v.appendChild(warnContainer);

  // Save bar
  const saveBar = div('save-bar');
  const saveBtn = btn('btn-primary', editId ? 'Save changes' : 'Save & store record', () => {
    const warnings = checkDups(form, editId);
    if (warnings.length > 0 && !confirmMode) {
      confirmMode = true;
      warnContainer.innerHTML = '';
      const wb = div('warn-box');
      const wp = document.createElement('p'); wp.style.fontWeight='600'; wp.textContent='Possible duplicate detected'; wb.appendChild(wp);
      for (const w of warnings) { const wl = document.createElement('p'); wl.textContent = '· ' + w; wb.appendChild(wl); }
      const wn = document.createElement('p'); wn.textContent = 'If correct, hit Save anyway.'; wb.appendChild(wn);
      warnContainer.appendChild(wb);
      saveBtn.textContent = 'Save anyway';
      saveBtn.style.background = '#854f0b';
      return;
    }
    doSave();
  });
  saveBar.appendChild(saveBtn);

  const cancelBtn = btn('', 'Cancel', () => { form = null; editId = null; renderList(); });
  saveBar.appendChild(cancelBtn);
  v.appendChild(saveBar);
}

function doSave() {
  // Add any custom species to the permanent species list
  for (const item of form.items) {
    if (item.species === 'Other' && item.custom.trim()) {
      const name = item.custom.trim();
      // Insert before 'Other'
      if (!species.includes(name)) {
        species.splice(species.indexOf('Other'), 0, name);
        item.species = name;
        item.custom = '';
      } else {
        item.species = name;
        item.custom = '';
      }
    }
  }
  const rec = {...form, id: editId || uid()};
  if (editId) {
    intakes = intakes.map(r => r.id === editId ? rec : r);
  } else {
    intakes.push(rec);
  }
  saveData();
  form = null; editId = null;
  renderList();
  showToast('Record saved');
}

function startNew() {
  // Always recalculate from current intakes so batch code is always next in sequence
  const c = seasonCode(today());
  const n = nextNum(c, intakes);
  form = { date: today(), season: c, batchCode: `${c}-${n}`, batchOverride: false, estateId: '', processorId: '', ref: '', items: [newItem()], notes: '' };
  editId = null;
  renderForm();
}

function startEdit(r) {
  form = JSON.parse(JSON.stringify(r));
  form.batchOverride = true;
  editId = r.id;
  renderForm();
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportData() {
  // Fixed filename so it always overwrites the previous backup
  const filename = `FSA-intake-records.json`;
  const data = JSON.stringify({intakes, deliveries, estates, processors, parts, species}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('Saved as FSA-intake-records.json — save to your Dropbox folder');
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.intakes) intakes = d.intakes;
      if (d.deliveries) deliveries = d.deliveries;
      if (d.estates) estates = d.estates;
      if (d.processors) processors = d.processors;
      if (d.parts && d.parts.length) parts = d.parts;
      if (d.species && d.species.length) species = d.species;
      if (d.deliveries) deliveries = d.deliveries;
      migrateShortCodes();
      saveData();
      renderList();
      showToast(`Loaded ${intakes.length} records from file`);
    } catch(err) { showToast('Could not read file — is it the right format?'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Season integrity check ───────────────────────────────────────────────────
function checkAndFixSeasons() {
  let fixed = 0;
  intakes = intakes.map(r => {
    const extracted = seasonFromBatch(r.batchCode);
    if (extracted && r.season !== extracted) {
      fixed++;
      return {...r, season: extracted};
    }
    return r;
  });
  if (fixed > 0) {
    saveData();
    showToast(`Fixed season code on ${fixed} record${fixed>1?'s':''}`);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadData();
  migrateShortCodes();
  checkAndFixSeasons();
  renderList();
})();
</script>
