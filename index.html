        const st = pair[0], lbl = pair[1];
        const b = btn('toggle-btn' + (stn.status === st ? ' active' : ''), lbl, function() {
          stn.status = st;
          renderStations();
        });
        statusRow.appendChild(b);
      });
      statusField.appendChild(statusRow);
      sCard.appendChild(statusField);

      const notesField = div('field'); notesField.style.marginTop = '12px';
      notesField.appendChild(label('Notes for this station (optional)'));
      const notesInp = document.createElement('textarea');
      notesInp.rows = 2; notesInp.value = stn.notes||'';
      notesInp.placeholder = 'Anything specific about this station...';
      notesInp.addEventListener('input', function(e) { stn.notes = e.target.value; });
      notesField.appendChild(notesInp);
      sCard.appendChild(notesField);

      stationsContainer.appendChild(sCard);
    });

    const addBtn = btn('add-link', '+ Add bait station', function() {
      pestForm.stations.push({id: uid(), name:'', status:'replaced', notes:''});
      renderStations();
    });
    addBtn.style.cssText += ';margin-bottom:1rem;';
    stationsContainer.appendChild(addBtn);
  }
  renderStations();

  // Insectocutors section
  vP.appendChild(p('section-title', 'Insectocutors'));
  const insHelp = p('muted', 'Tick what you serviced today for each unit. Sticky boards typically need changing every 3 months.');
  insHelp.style.cssText = 'margin-bottom:10px;font-size:12px;';
  vP.appendChild(insHelp);
  const insCard = div('card');
  const insConfigs = {
    foyer:          {label: 'Foyer (zapper)',         items: [['cleanout','Cleaned out'],         ['lamp','Lamp changed'], ['starter','Starter motor changed']]},
    plucking_room:  {label: 'Plucking room (sticky)', items: [['sticky','Sticky board changed'],  ['lamp','Lamp changed'], ['starter','Starter motor changed']]},
    build_room:     {label: 'Build room (sticky)',    items: [['sticky','Sticky board changed'],  ['lamp','Lamp changed'], ['starter','Starter motor changed']]}
  };
  ['foyer','plucking_room','build_room'].forEach(function(area) {
    const cfg = insConfigs[area];
    if (!pestForm.insectocutors[area]) {
      pestForm.insectocutors[area] = {};
    }
    const areaSection = document.createElement('div');
    areaSection.style.cssText = 'background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:12px 14px;margin-bottom:10px;';
    const areaTitle = document.createElement('p');
    areaTitle.style.cssText = 'font-size:13px;font-weight:600;color:#27500a;margin-bottom:10px;';
    areaTitle.textContent = cfg.label;
    areaSection.appendChild(areaTitle);
    cfg.items.forEach(function(itemPair) {
      const key = itemPair[0], itemLbl = itemPair[1];
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:6px 0;';
      const chk = document.createElement('input'); chk.type = 'checkbox';
      chk.checked = !!pestForm.insectocutors[area][key];
      chk.style.cssText = 'width:18px;height:18px;accent-color:#3a6b2a;cursor:pointer;flex-shrink:0;';
      const chkId = 'pest_chk_' + area + '_' + key;
      chk.id = chkId;
      chk.addEventListener('change', function(e) {
        pestForm.insectocutors[area][key] = e.target.checked;
      });
      const lblEl = document.createElement('label');
      lblEl.htmlFor = chkId;
      lblEl.textContent = itemLbl;
      lblEl.style.cssText = 'font-size:13px;cursor:pointer;color:#1a1a1a;flex:1;';
      row.appendChild(chk); row.appendChild(lblEl);
      areaSection.appendChild(row);
    });
    insCard.appendChild(areaSection);
  });
  vP.appendChild(insCard);

  // General comments
  const commentsCard = div('card');
  commentsCard.appendChild(label('General comments'));
  const commentsInp = document.createElement('textarea');
  commentsInp.rows = 3; commentsInp.value = pestForm.generalComment||'';
  commentsInp.placeholder = 'Overall observations, things to follow up on, anything noticed today...';
  commentsInp.addEventListener('input', function(e) { pestForm.generalComment = e.target.value; });
  commentsCard.appendChild(commentsInp);
  vP.appendChild(commentsCard);

  // Save bar
  const saveBar = div('save-bar');
  const saveBtn = btn('btn-primary', pestEditId ? 'Save changes' : 'Save pest check', function() {
    const rec = Object.assign({}, pestForm, {id: pestEditId || uid()});
    // Strip stations where no status was chosen — user skipped them
    rec.stations = (rec.stations || []).filter(function(s) {
      return s.status === 'replaced' || s.status === 'no_activity';
    });
    if (pestEditId) {
      pestRecords = pestRecords.map(function(r) { return r.id === pestEditId ? rec : r; });
    } else {
      pestRecords.push(rec);
    }
    saveData();
    showToast('Pest check saved');
    pestForm = null; pestEditId = null;
    renderPestControl();
  });
  saveBar.appendChild(saveBtn);
  const cancelBtn = btn('', 'Cancel', function() {
    pestForm = null; pestEditId = null;
    if (pestRecords.length > 0) renderPestRecordsList(); else renderPestControl();
  });
  saveBar.appendChild(cancelBtn);
  vP.appendChild(saveBar);
}

// ── Production ────────────────────────────────────────────────────────────────
let prodForm = null;
let prodEditId = null;
let prodStageEdit = null;

function processCodeFromDate(dateStr) {
  return (dateStr || today()).replace(/-/g, '');
}

function getSpeciesForBatch(batchCode) {
  const intake = intakes.find(function(i){ return i.batchCode === batchCode; });
  if (!intake || !intake.items || !intake.items[0]) return '';
  const sp = intake.items[0].species;
  return sp === 'Other' ? (intake.items[0].custom || 'Other') : sp;
}

function getFatPercentForSpecies(speciesName) {
  if (!speciesName) return null;
  return Object.prototype.hasOwnProperty.call(speciesFat, speciesName) ? speciesFat[speciesName] : null;
}

function runsForBatch(batchCode) {
  return productionRecords.filter(function(r){ return r.batchCode === batchCode; });
}

function blankProductionRecord(batchCode) {
  const speciesName = getSpeciesForBatch(batchCode);
  return {
    id: uid(),
    processCode: processCodeFromDate(today()),
    startDate: today(),
    finishedDate: null,
    batchCode: batchCode,
    speciesName: speciesName,
    fatPercent: getFatPercentForSpecies(speciesName),
    status: 'in_progress',
    stages: [],
    runNumber: runsForBatch(batchCode).length + 1
  };
}

function hideAllExceptProd() {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'none';
  if(document.getElementById('view-daily'))document.getElementById('view-daily').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  document.getElementById('view-wetmeat').style.display = 'none';
  document.getElementById('view-delivery').style.display = 'none';
  if(document.getElementById('view-pest'))document.getElementById('view-pest').style.display = 'none';
  if(document.getElementById('view-clean'))document.getElementById('view-clean').style.display = 'none';
  document.getElementById('view-prod').style.display = 'block';
}

function renderProduction() {
  currentView = 'prod';
  hideAllExceptProd();
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  renderTabs('prod');

  const hdr = div('header-bar');
  const hdrLeft = div('');
  hdrLeft.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Production runs'));
  const inProg = productionRecords.filter(function(r){ return r.status === 'in_progress'; });
  const fin = productionRecords.filter(function(r){ return r.status === 'finished'; });
  hdrLeft.appendChild(p('muted', inProg.length + ' in progress · ' + fin.length + ' finished'));
  hdr.appendChild(hdrLeft);
  const newBtn = btn('btn-primary', '+ Start new run', startNewProductionRun);
  hdr.appendChild(newBtn);
  v.appendChild(hdr);

  if (inProg.length === 0 && fin.length === 0) {
    const empty = div('empty-state');
    empty.appendChild(el('h3', {}, 'No production runs yet'));
    empty.appendChild(p('', 'Start your first run when you defrost a batch of meat.'));
    const b = btn('btn-primary big-btn', '+ Start new run', startNewProductionRun);
    empty.appendChild(b);
    v.appendChild(empty);
    return;
  }

  if (inProg.length > 0) {
    const sec = div('');
    sec.appendChild(el('h3', {style:'font-size:14px;font-weight:600;color:#27500a;margin:1rem 0 8px;'}, 'In progress'));
    inProg.sort(function(a,b){ return (b.startDate||'').localeCompare(a.startDate||''); }).forEach(function(r){
      sec.appendChild(productionCardSummary(r));
    });
    v.appendChild(sec);
  }

  if (fin.length > 0) {
    const linkBtn = document.createElement('button');
    linkBtn.style.cssText = 'background:none;border:none;color:#888;font-size:12px;cursor:pointer;text-decoration:underline;display:block;margin:1.5rem auto 0;';
    linkBtn.textContent = 'View finished runs (' + fin.length + ')';
    linkBtn.addEventListener('click', renderProductionRecordsList);
    v.appendChild(linkBtn);
  }
}

function productionCardSummary(r) {
  const card = div('card');
  card.style.cssText = 'cursor:pointer;margin-bottom:10px;';
  const top = div('row-sb');
  top.style.marginBottom = '6px';
  const left = div(''); left.style.flex = '1';
  left.appendChild(el('span', {style:'font-size:15px;font-weight:600;color:#1a1a1a;'}, (r.speciesName || 'Run')));
  left.appendChild(el('span', {className:'muted'}, ' · run ' + (r.runNumber || '?') + ' from ' + (r.batchCode || '?')));
  top.appendChild(left);
  const pillBg = r.status === 'finished' ? '#eaf3de' : '#faeeda';
  const pillFg = r.status === 'finished' ? '#27500a' : '#633806';
  top.appendChild(el('span', {style:'background:'+pillBg+';color:'+pillFg+';font-size:11px;padding:3px 10px;border-radius:8px;white-space:nowrap;'}, r.status === 'finished' ? 'Finished' : 'In progress'));
  card.appendChild(top);
  const stageCount = (r.stages || []).length;
  card.appendChild(p('muted', 'Process ' + (r.processCode || '?') + ' · ' + stageCount + ' day' + (stageCount===1?'':'s') + ' worked'));
  card.addEventListener('click', function(){ openProductionRun(r.id); });
  return card;
}

function startNewProductionRun() {
  hideAllExceptProd();
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  renderTabs('prod');
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Start a new production run'));
  const backBtn = btn('', '← Back', renderProduction);
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  const card = div('card');
  card.appendChild(p('', 'Which intake batch is this run from?'));
  if (intakes.length === 0) {
    card.appendChild(p('muted', 'No intake records yet — book the meat in first under Intake Records.'));
    v.appendChild(card);
    return;
  }
  const sortedIntakes = [...intakes].sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  const sel = document.createElement('select');
  sel.style.cssText = 'width:100%;margin:8px 0 12px;';
  const blank = document.createElement('option'); blank.value=''; blank.textContent='— pick a batch —';
  sel.appendChild(blank);
  sortedIntakes.forEach(function(i){
    const sp = (i.items && i.items[0]) ? (i.items[0].species==='Other'?(i.items[0].custom||'Other'):i.items[0].species) : '';
    const estName = getName(estates, i.estateId);
    const op = document.createElement('option');
    op.value = i.batchCode;
    op.textContent = i.batchCode + ' · ' + sp + ' · ' + fmtDate(i.date) + (estName?(' · '+estName):'');
    sel.appendChild(op);
  });
  card.appendChild(sel);

  const startBtn = btn('btn-primary', 'Start run', function(){
    if (!sel.value) { showToast('Pick a batch first'); return; }
    const batchCode = sel.value;
    const speciesName = getSpeciesForBatch(batchCode);
    const fatPct = getFatPercentForSpecies(speciesName);
    if (fatPct === null && speciesName) {
      promptForFatPercent(speciesName, function(pct){
        speciesFat[speciesName] = pct;
        saveData();
        actuallyStartRun(batchCode);
      });
    } else {
      actuallyStartRun(batchCode);
    }
  });
  card.appendChild(startBtn);
  const cancelBtn = btn('', 'Cancel', renderProduction);
  cancelBtn.style.marginLeft = '8px';
  card.appendChild(cancelBtn);
  v.appendChild(card);
}

function promptForFatPercent(speciesName, onSet) {
  hideAllExceptProd();
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  renderTabs('prod');
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Set fat % for ' + speciesName));
  v.appendChild(hdr);
  const card = div('card');
  card.appendChild(p('', 'No fat % saved yet for ' + speciesName + '. How much fat do you add to the meat, as a % of the meat weight?'));
  card.appendChild(p('muted', 'For example, 20% means 2kg of fat added to every 10kg of meat. You only set this once for ' + speciesName + ' — it gets remembered next time.'));
  const inp = input({type:'number', min:'1', max:'60', step:'1', value:'25'});
  inp.style.cssText = 'width:120px;margin:8px 0 12px;';
  card.appendChild(inp);
  const saveBtn = btn('btn-primary', 'Save and continue', function(){
    const val = parseFloat(inp.value);
    if (isNaN(val) || val < 1 || val > 60) { showToast('Enter a value between 1 and 60'); return; }
    onSet(val);
  });
  card.appendChild(saveBtn);
  const cancelBtn = btn('', 'Cancel', renderProduction);
  cancelBtn.style.marginLeft = '8px';
  card.appendChild(cancelBtn);
  v.appendChild(card);
}

function actuallyStartRun(batchCode) {
  const r = blankProductionRecord(batchCode);
  productionRecords.push(r);
  saveData();
  openProductionRun(r.id);
}

function openProductionRun(id) {
  const r = productionRecords.find(function(x){ return x.id === id; });
  if (!r) { renderProduction(); return; }
  prodForm = JSON.parse(JSON.stringify(r));
  prodEditId = id;
  prodStageEdit = null;
  renderProductionForm();
}

function renderProductionForm() {
  if (!prodForm) { renderProduction(); return; }
  hideAllExceptProd();
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  renderTabs('prod');

  if (prodStageEdit) {
    renderStageForm();
    return;
  }

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, prodForm.speciesName || 'Production run'));
  const backBtn = btn('', '← Back', function(){ prodForm = null; prodEditId = null; prodStageEdit = null; renderProduction(); });
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  const card = div('card');
  const top = div('row-sb');
  top.style.marginBottom = '12px';
  const titleSide = div('');
  titleSide.appendChild(el('p', {style:'font-size:13px;color:#888;margin:0 0 2px;'}, 'Run ' + (prodForm.runNumber || '?') + ' from this batch'));
  titleSide.appendChild(el('p', {style:'font-size:16px;font-weight:600;margin:0;'}, prodForm.speciesName || ''));
  top.appendChild(titleSide);
  const pillBg = prodForm.status === 'finished' ? '#eaf3de' : '#faeeda';
  const pillFg = prodForm.status === 'finished' ? '#27500a' : '#633806';
  top.appendChild(el('span', {style:'background:'+pillBg+';color:'+pillFg+';font-size:12px;padding:4px 12px;border-radius:8px;white-space:nowrap;'}, prodForm.status === 'finished' ? 'Finished' : 'In progress'));
  card.appendChild(top);

  const codes = div('');
  codes.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;';
  const bcBox = div(''); bcBox.style.cssText = 'background:#f5f5f4;border-radius:6px;padding:10px 12px;';
  bcBox.appendChild(el('p', {style:'font-size:11px;color:#888;margin:0 0 3px;'}, 'Batch code'));
  bcBox.appendChild(el('p', {style:'font-family:monospace;font-size:16px;font-weight:500;margin:0;letter-spacing:1px;'}, prodForm.batchCode || '—'));
  codes.appendChild(bcBox);
  const pcBox = div(''); pcBox.style.cssText = 'background:#f5f5f4;border-radius:6px;padding:10px 12px;';
  pcBox.appendChild(el('p', {style:'font-size:11px;color:#888;margin:0 0 3px;'}, 'Process code'));
  pcBox.appendChild(el('p', {style:'font-family:monospace;font-size:16px;font-weight:500;color:#27500a;margin:0;letter-spacing:1px;'}, prodForm.processCode || '—'));
  codes.appendChild(pcBox);
  card.appendChild(codes);

  // Children (divisions) — created by the Fat calculator
  if (prodForm.children && prodForm.children.length > 0) {
    card.appendChild(el('p', {style:'font-size:13px;font-weight:500;color:#27500a;margin:0 0 8px;'}, 'Children in this run (' + prodForm.children.length + ')'));
    const kidsWrap = div(''); kidsWrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:14px;';
    prodForm.children.forEach(function(c){
      const row = div(''); row.style.cssText = 'background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:10px 12px;';
      row.appendChild(el('p', {style:'font-size:13px;font-weight:600;margin:0 0 2px;'}, 'Child ' + c.code));
      const bits = [c.meatKg + 'kg meat + ' + c.fatKg + 'kg fat = ' + c.totalKg + 'kg'];
      if (c.recipe && c.recipe.name) bits.push(c.recipe.name);
      row.appendChild(el('p', {style:'font-size:12px;color:#666;margin:0;'}, bits.join(' · ')));
      kidsWrap.appendChild(row);
    });
    card.appendChild(kidsWrap);
  }

  card.appendChild(el('p', {style:'font-size:13px;font-weight:500;color:#27500a;margin:0 0 8px;'}, 'Days worked on this batch'));
  const stagesContainer = div('');
  stagesContainer.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:14px;';
  if (!prodForm.stages || prodForm.stages.length === 0) {
    stagesContainer.appendChild(p('muted', 'No days logged yet. Tap below to add your first.'));
  } else {
    prodForm.stages.forEach(function(s, idx){
      stagesContainer.appendChild(stageRowSummary(s, idx));
    });
  }
  card.appendChild(stagesContainer);

  if (prodForm.status !== 'finished') {
    const addBtn = btn('btn-primary', '+ Add today\'s stage', function(){
      prodStageEdit = {picker: true};
      renderProductionForm();
    });
    addBtn.style.marginRight = '8px';
    card.appendChild(addBtn);
    const finBtn = btn('', 'Mark batch finished', function(){
      if (!confirm('Mark this batch finished? You can still view it after, but no more stages can be added.')) return;
      prodForm.status = 'finished';
      prodForm.finishedDate = today();
      saveAndReturn();
    });
    card.appendChild(finBtn);
  }
  v.appendChild(card);

  const delBar = div('');
  delBar.style.cssText = 'margin-top:1.5rem;text-align:center;';
  const delBtn = btn('btn-sm btn-danger', 'Delete this run', function(){
    if (!confirm('Delete this entire production run? This cannot be undone.')) return;
    productionRecords = productionRecords.filter(function(r){ return r.id !== prodEditId; });
    saveData();
    showToast('Run deleted');
    prodForm = null; prodEditId = null;
    renderProduction();
  });
  delBar.appendChild(delBtn);
  v.appendChild(delBar);
}

function stageRowSummary(s, idx) {
  const row = div('');
  row.style.cssText = 'display:flex;align-items:flex-start;gap:10px;background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:10px 12px;';
  const icon = {defrost:'❄️', fatcalc:'🧮', recipe:'📋', mince:'🔪', stuff_hang:'🌭'}[s.type] || '•';
  const typeName = {defrost:'Defrost', fatcalc:'Fat calculator', recipe:'Recipe', mince:'Prep, wash & mince', stuff_hang:'Stuffing & hanging'}[s.type] || s.type;
  let summary = '';
  if (s.type === 'defrost') summary = (s.meatKg ? s.meatKg + 'kg meat out' : '');
  else if (s.type === 'fatcalc') summary = (s.totalKg ? s.meatKg + 'kg meat + ' + s.fatKg + 'kg fat = ' + s.totalKg + 'kg (' + s.fatPercent + '%)' : '');
  else if (s.type === 'recipe') summary = (s.recipeName ? s.recipeName + (s.childLetter ? ' → Child ' + (prodForm.batchCode||'') + s.childLetter : '') : '');
  else if (s.type === 'mince') summary = (s.meatKg ? s.meatKg + 'kg minced' : 'minced');
  else if (s.type === 'stuff_hang') summary = (s.count ? s.count + (s.unitGrams ? ' × ' + s.unitGrams + 'g' : ' salami') : '');
  const main = div(''); main.style.flex = '1';
  main.appendChild(el('p', {style:'font-size:13px;font-weight:500;margin:0 0 2px;'}, icon + ' ' + typeName));
  main.appendChild(el('p', {style:'font-size:12px;color:#888;margin:0;'}, fmtDate(s.date) + (summary ? ' · ' + summary : '')));
  if (s.notes) main.appendChild(el('p', {style:'font-size:12px;color:#444;margin:4px 0 0;font-style:italic;'}, '"' + s.notes + '"'));
  row.appendChild(main);
  if (prodForm.status !== 'finished') {
    const rmBtn = btn('btn-sm btn-danger', '✕', function(){
      if (!confirm('Remove this ' + typeName + ' stage?')) return;
      prodForm.stages.splice(idx, 1);
      saveAndStay();
    });
    rmBtn.style.cssText += ';padding:4px 8px;flex-shrink:0;';
    row.appendChild(rmBtn);
  }
  return row;
}

function renderStageForm() {
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  renderTabs('prod');
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Add today\'s stage'));
  const backBtn = btn('', '← Back', function(){ prodStageEdit = null; renderProductionForm(); });
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  if (prodStageEdit && prodStageEdit.picker) {
    const card = div('card');
    card.appendChild(p('', 'What type of day was today?'));
    [['defrost','❄️ Defrost day','Took meat (or fat) out to defrost'],
     ['fatcalc','🧮 Fat calculator','Work out the fat to add (meat + fat = total mix)'],
     ['recipe','📋 Recipe','Build or load a recipe for a child (salt, spices, scaled to weight)'],
     ['mince','🔪 Prep, wash & mince day','Washed and minced the batch'],
     ['stuff_hang','🌭 Stuffing & hanging day','Stuffed into skins and hung']
    ].forEach(function(tr){
      const t = tr[0], lbl = tr[1], desc = tr[2];
      const tBtn = document.createElement('button');
      tBtn.style.cssText = 'display:block;width:100%;text-align:left;margin-bottom:8px;padding:12px 14px;border:1px solid #d0e8c8;border-radius:8px;background:#fff;cursor:pointer;';
      tBtn.innerHTML = '<p style="font-size:14px;font-weight:500;margin:0 0 2px;">' + lbl + '</p>' +
                       '<p style="font-size:12px;color:#666;margin:0;">' + desc + '</p>';
      tBtn.addEventListener('click', function(){
        prodStageEdit = {type: t, date: today(), notes: ''};
        renderProductionForm();
      });
      card.appendChild(tBtn);
    });
    v.appendChild(card);
    return;
  }

  const t = prodStageEdit.type;
  const card = div('card');
  const typeName = {defrost:'Defrost day', fatcalc:'Fat calculator', recipe:'Recipe', mince:'Prep, wash & mince day', stuff_hang:'Stuffing & hanging day'}[t] || t;
  card.appendChild(el('h3', {style:'font-size:16px;font-weight:600;margin:0 0 12px;'}, typeName));

  const dateField = div('field');
  dateField.appendChild(label('Date'));
  const dateInp = input({type:'date', value: prodStageEdit.date || today()});
  dateInp.addEventListener('change', function(e){ prodStageEdit.date = e.target.value; });
  dateField.appendChild(dateInp);
  card.appendChild(dateField);

  if (t === 'defrost') {
    const meatField = div('field'); meatField.style.marginTop = '12px';
    meatField.appendChild(label('Meat quantity out of freezer (kg)'));
    const meatInp = input({type:'number', min:'0', step:'0.1', value: prodStageEdit.meatKg || ''});
    meatInp.placeholder = 'e.g. 30';
    meatInp.addEventListener('input', function(e){ prodStageEdit.meatKg = parseFloat(e.target.value) || 0; });
    meatField.appendChild(meatInp);
    meatField.appendChild(p('muted', 'If today was just a fat-defrost top-up, leave this blank and put a note below.'));
    card.appendChild(meatField);
  } else if (t === 'fatcalc') {
    // Fat calculator stage. Fat is added as a % of the meat (10kg + 20% = 2kg fat = 12kg total).
    const known = getFatPercentForSpecies(prodForm.speciesName);
    if (prodStageEdit.fatPercent == null) prodStageEdit.fatPercent = (prodForm.fatPercent != null ? prodForm.fatPercent : (known != null ? known : 25));
    // pre-fill meat from latest defrost if not already set
    if (prodStageEdit.meatKg == null) {
      const defs = (prodForm.stages || []).filter(function(s){ return s.type === 'defrost' && s.meatKg > 0; }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
      prodStageEdit.meatKg = defs.length ? defs[0].meatKg : 0;
    }
    card.appendChild(p('muted', 'Fat is added as a % of the meat. Example: 10kg meat + 20% = 2kg fat = 12kg total.'));
    if (prodStageEdit.childCount == null) prodStageEdit.childCount = 1;

    const meatField = div('field'); meatField.style.marginTop = '12px';
    meatField.appendChild(label('Meat weight (kg)'));
    const meatInp = input({type:'number', min:'0', step:'0.1', value: prodStageEdit.meatKg || ''});
    meatInp.placeholder = 'e.g. 20';
    meatInp.style.cssText = 'width:140px;';
    card.appendChild(meatField); meatField.appendChild(meatInp);

    const pctField = div('field'); pctField.style.marginTop = '12px';
    pctField.appendChild(label('Fat to add (% of the meat)' + (prodForm.speciesName ? ' — ' + prodForm.speciesName : '')));
    const pctInp = input({type:'number', min:'1', max:'60', step:'1', value: prodStageEdit.fatPercent});
    pctInp.style.cssText = 'width:140px;';
    card.appendChild(pctField); pctField.appendChild(pctInp);

    const childField = div('field'); childField.style.marginTop = '12px';
    childField.appendChild(label('Divide into how many children? (each its own flavour)'));
    const childInp = input({type:'number', min:'1', max:'12', step:'1', value: prodStageEdit.childCount});
    childInp.style.cssText = 'width:140px;';
    card.appendChild(childField); childField.appendChild(childInp);
    childField.appendChild(p('muted', 'The mixer works best at 20kg or under per child. They become Child ' + (prodForm.batchCode||'') + 'A, B, C…'));

    const resultHolder = div(''); resultHolder.style.marginTop = '14px';
    card.appendChild(resultHolder);

    function recomputeFat() {
      const m = parseFloat(meatInp.value) || 0;
      const pct = parseFloat(pctInp.value);
      let n = parseInt(childInp.value) || 1; if (n < 1) n = 1;
      prodStageEdit.meatKg = m;
      prodStageEdit.fatPercent = isNaN(pct) ? null : pct;
      prodStageEdit.childCount = n;
      resultHolder.innerHTML = '';
      if (!m || m <= 0 || isNaN(pct) || pct <= 0) {
        prodStageEdit.fatKg = 0; prodStageEdit.totalKg = 0;
        resultHolder.appendChild(p('muted', 'Enter a meat weight and fat % to see the result.'));
        return;
      }
      const fat = Math.round(m * (pct/100) * 100) / 100;
      const total = Math.round((m + fat) * 100) / 100;
      prodStageEdit.fatKg = fat; prodStageEdit.totalKg = total;
      const leanCompPct = total > 0 ? Math.round((m/total)*1000)/10 : 100;
      const fatCompPct = total > 0 ? Math.round((fat/total)*1000)/10 : 0;
      const cc = div('');
      cc.style.cssText = 'background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:14px 16px;';
      cc.appendChild(el('p', {style:'font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px;'}, 'Whole run · add ' + pct + '% fat to the meat'));
      const grid = div(''); grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;';
      [['Meat (lean)', m + ' kg'], ['Add fat', fat + ' kg'], ['Total mix', total + ' kg']].forEach(function(pair){
        const b = div(''); b.style.cssText = 'background:#fff;border-radius:6px;padding:8px 10px;text-align:center;';
        b.appendChild(el('p', {style:'font-size:10px;color:#888;margin:0 0 2px;'}, pair[0]));
        b.appendChild(el('p', {style:'font-size:14px;font-weight:600;margin:0;color:#1a1a1a;'}, pair[1]));
        grid.appendChild(b);
      });
      cc.appendChild(grid);
      cc.appendChild(el('p', {style:'font-size:11px;color:#888;margin:0 0 4px;'}, 'Finished mix (lean vs fat)'));
      const bar = document.createElement('div'); bar.style.cssText = 'display:flex;width:100%;height:36px;border-radius:6px;overflow:hidden;';
      const ls = document.createElement('div'); ls.style.cssText = 'background:#A32D2D;display:flex;align-items:center;justify-content:center;width:' + leanCompPct + '%;';
      ls.innerHTML = '<span style="color:#FCEBEB;font-size:12px;font-weight:500;white-space:nowrap;padding:0 6px;">Lean ' + m + 'kg</span>';
      const fs2 = document.createElement('div'); fs2.style.cssText = 'background:#FAC775;display:flex;align-items:center;justify-content:center;width:' + fatCompPct + '%;';
      fs2.innerHTML = '<span style="color:#412402;font-size:12px;font-weight:500;white-space:nowrap;padding:0 6px;">Fat ' + fat + 'kg</span>';
      bar.appendChild(ls); bar.appendChild(fs2); cc.appendChild(bar);
      resultHolder.appendChild(cc);

      // Per-child breakdown
      if (n > 1) {
        const childMeat = Math.round((m / n) * 100) / 100;
        const childFat = Math.round((fat / n) * 100) / 100;
        const childTotal = Math.round((total / n) * 100) / 100;
        const kids = div(''); kids.style.cssText = 'background:#fff;border:1px solid #d0e8c8;border-radius:8px;padding:14px 16px;margin-top:10px;';
        kids.appendChild(el('p', {style:'font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px;'}, 'Each of the ' + n + ' children'));
        const krow = div(''); krow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;';
        [['Meat each', childMeat + ' kg'], ['Fat each', childFat + ' kg'], ['Total each', childTotal + ' kg']].forEach(function(pair){
          const b = div(''); b.style.cssText = 'background:#f9fdf8;border-radius:6px;padding:8px 10px;text-align:center;';
          b.appendChild(el('p', {style:'font-size:10px;color:#888;margin:0 0 2px;'}, pair[0]));
          b.appendChild(el('p', {style:'font-size:14px;font-weight:600;margin:0;color:#27500a;'}, pair[1]));
          krow.appendChild(b);
        });
        kids.appendChild(krow);
        const letters = []; for (let i=0;i<n;i++) letters.push((prodForm.batchCode||'') + String.fromCharCode(65+i));
        kids.appendChild(el('p', {style:'font-size:12px;color:#444;margin:10px 0 0;'}, 'Children: ' + letters.map(function(c){return 'Child ' + c;}).join(', ')));
        resultHolder.appendChild(kids);
      }
    }
    meatInp.addEventListener('input', recomputeFat);
    pctInp.addEventListener('input', recomputeFat);
    childInp.addEventListener('input', recomputeFat);
    recomputeFat();
  } else if (t === 'recipe') {
    // Recipe stage. Pick a child, load from library or build fresh; lines scale to the
    // child's total mix (meat+fat). Every gram is editable. Salt is line 1.
    const children = prodForm.children || [];
    if (children.length === 0) {
      const warn = div('');
      warn.style.cssText = 'background:#faeeda;border:1px solid #f0d4a8;border-radius:8px;padding:12px 14px;margin-top:12px;';
      warn.appendChild(p('', 'No children yet. Do the Fat calculator first and set how many children this run divides into — then build a recipe for each child.'));
      card.appendChild(warn);
    } else {
      if (prodStageEdit.childLetter == null) prodStageEdit.childLetter = children[0].letter;
      if (prodStageEdit.lines == null) prodStageEdit.lines = STANDARD_RECIPE_LINES.map(function(l){ return Object.assign({}, l); });

      // Child picker
      const cf = div('field'); cf.style.marginTop = '12px';
      cf.appendChild(label('Which child is this recipe for?'));
      const cSel = select(children.map(function(c){ return [c.letter, 'Child ' + c.code + ' (' + c.totalKg + 'kg)']; }), prodStageEdit.childLetter, function(val){
        prodStageEdit.childLetter = val;
        // if that child already has a saved recipe, load its lines
        const ch = children.find(function(c){ return c.letter === val; });
        if (ch && ch.recipe && ch.recipe.lines) { prodStageEdit.lines = ch.recipe.lines.map(function(l){ return Object.assign({}, l); }); prodStageEdit.recipeName = ch.recipe.name; }
        renderStageForm();
      });
      cSel.style.cssText = 'width:100%;margin-top:4px;';
      cf.appendChild(cSel); card.appendChild(cf);

      // Library loader
      const lf = div('field'); lf.style.marginTop = '12px';
      lf.appendChild(label('Load a recipe from the library (or build fresh below)'));
      const libOpts = [['','— build fresh —']].concat(recipeLibrary.map(function(r){ return [r.id, r.name]; }));
      const lSel = select(libOpts, '', function(val){
        if (!val) return;
        const r = recipeLibrary.find(function(x){ return x.id === val; });
        if (r) { prodStageEdit.lines = r.ingredients.map(function(l){ return Object.assign({}, l); }); prodStageEdit.recipeName = r.name; renderStageForm(); }
      });
      lSel.style.cssText = 'width:100%;margin-top:4px;';
      lf.appendChild(lSel); card.appendChild(lf);

      // Recipe name
      const nf = div('field'); nf.style.marginTop = '12px';
      nf.appendChild(label('Recipe name'));
      const nInp = input({type:'text', value: prodStageEdit.recipeName || ''});
      nInp.placeholder = 'e.g. Garlic & Black Pepper';
      nInp.style.cssText = 'width:100%;';
      nInp.addEventListener('input', function(e){ prodStageEdit.recipeName = e.target.value; });
      nf.appendChild(nInp); card.appendChild(nf);

      const child = children.find(function(c){ return c.letter === prodStageEdit.childLetter; }) || children[0];
      const childTotal = child.totalKg || 0;

      // Ingredient table — suggested grams (editable)
      card.appendChild(el('p', {style:'font-size:13px;font-weight:600;color:#27500a;margin:14px 0 6px;'}, 'Ingredients for Child ' + child.code + ' (' + childTotal + 'kg mix)'));
      card.appendChild(p('muted', 'The app suggests an amount; type over it any time (colour, species, taste).'));
      const tbl = div(''); tbl.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-top:8px;';

      function suggestG(line) {
        if (line.type === 'pct') return Math.round(childTotal * 1000 * (line.value/100));
        if (line.type === 'perkg') return Math.round(childTotal * line.value);
        if (line.type === 'fixed') return line.value;
        return null; // asneeded
      }

      prodStageEdit.lines.forEach(function(line, idx){
        if (line.amount == null) line.amount = suggestG(line); // seed editable amount once
        const row = div(''); row.style.cssText = 'display:flex;align-items:center;gap:8px;background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:8px 10px;';
        const nm = el('span', {style:'flex:1;font-size:14px;'}, line.name);
        row.appendChild(nm);
        if (line.type === 'asneeded') {
          row.appendChild(el('span', {style:'font-size:13px;color:#888;'}, 'as needed'));
        } else {
          const amtInp = input({type:'number', min:'0', step:'1', value: (line.amount != null ? line.amount : '')});
          amtInp.style.cssText = 'width:80px;text-align:right;';
          amtInp.addEventListener('input', function(e){ line.amount = e.target.value === '' ? null : parseFloat(e.target.value); });
          row.appendChild(amtInp);
          row.appendChild(el('span', {style:'font-size:13px;color:#888;width:40px;'}, line.unit || 'g'));
        }
        // remove button (not for the 4 standard lines)
        if (idx >= 4) {
          const rm = el('button', {style:'background:none;border:none;color:#a32d2d;cursor:pointer;font-size:16px;'}, '×');
          rm.addEventListener('click', function(){ prodStageEdit.lines.splice(idx,1); renderStageForm(); });
          row.appendChild(rm);
        }
        tbl.appendChild(row);
      });
      card.appendChild(tbl);

      // Add ingredient
      const addBtn = btn('btn-secondary', '+ Add ingredient', function(){
        prodStageEdit.lines.push({name:'New ingredient', type:'fixed', value:0, unit:'g', amount:0});
        renderStageForm();
      });
      addBtn.style.cssText = 'margin-top:10px;background:#eef5ea;color:#27500a;border:1px solid #d0e8c8;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px;';
      card.appendChild(addBtn);

      // Save to library
      const saveLibWrap = div(''); saveLibWrap.style.cssText = 'margin-top:12px;';
      const saveLibBtn = btn('', 'Save this as a library recipe', function(){
        const nm = (prodStageEdit.recipeName || '').trim();
        if (!nm) { showToast('Give the recipe a name first'); return; }
        const existing = recipeLibrary.find(function(r){ return r.name.toLowerCase() === nm.toLowerCase(); });
        const ingredients = prodStageEdit.lines.map(function(l){ return {name:l.name, type:l.type, value:l.value, unit:l.unit}; });
        if (existing) { existing.ingredients = ingredients; }
        else { recipeLibrary.push({id:'rcp_'+Date.now(), name:nm, ingredients:ingredients}); }
        saveData();
        showToast('Saved "' + nm + '" to the library');
      });
      saveLibBtn.style.cssText = 'background:none;border:1px solid #bbb;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#555;';
      saveLibWrap.appendChild(saveLibBtn);
      card.appendChild(saveLibWrap);
    }
  } else if (t === 'mince') {
    const meatField = div('field'); meatField.style.marginTop = '12px';
    meatField.appendChild(label('Meat minced today (kg) — optional'));
    const meatInp = input({type:'number', min:'0', step:'0.1', value: prodStageEdit.meatKg || ''});
    meatInp.placeholder = 'e.g. 22';
    meatInp.addEventListener('input', function(e){ prodStageEdit.meatKg = parseFloat(e.target.value) || 0; });
    meatField.appendChild(meatInp);
    meatField.appendChild(p('muted', 'Fat is now worked out in the Fat calculator. This day just records the mince.'));
    card.appendChild(meatField);
    const countField = div('field'); countField.style.marginTop = '12px';
    countField.appendChild(label('Number of salami made today'));
    const countInp = input({type:'number', min:'0', step:'1', value: prodStageEdit.count || ''});
    countInp.placeholder = 'e.g. 24';
    countInp.addEventListener('input', function(e){ prodStageEdit.count = parseInt(e.target.value) || 0; });
    countField.appendChild(countInp);
    card.appendChild(countField);

    const sizeField = div('field'); sizeField.style.marginTop = '12px';
    sizeField.appendChild(label('Size of each (grams) — optional, varies by client'));
    const sizeInp = input({type:'number', min:'0', step:'10', value: prodStageEdit.unitGrams || ''});
    sizeInp.placeholder = 'e.g. 400';
    sizeInp.addEventListener('input', function(e){ prodStageEdit.unitGrams = parseInt(e.target.value) || 0; });
    sizeField.appendChild(sizeInp);
    card.appendChild(sizeField);
  }

  const notesField = div('field'); notesField.style.marginTop = '12px';
  notesField.appendChild(label('Notes (optional — what went well, what didn\'t)'));
  const notesInp = document.createElement('textarea');
  notesInp.rows = 3;
  notesInp.value = prodStageEdit.notes || '';
  notesInp.placeholder = 'e.g. "overfilled, bent mixer, stuffing pushed to tomorrow"';
  notesInp.addEventListener('input', function(e){ prodStageEdit.notes = e.target.value; });
  notesField.appendChild(notesInp);
  card.appendChild(notesField);

  v.appendChild(card);

  const saveBar = div('save-bar');
  const saveBtn = btn('btn-primary', 'Save stage', function(){
    if (t === 'defrost' && (!prodStageEdit.meatKg || prodStageEdit.meatKg <= 0) && !prodStageEdit.notes) {
      showToast('Enter the meat quantity or a note about what was defrosted'); return;
    }
    if (t === 'fatcalc' && (!prodStageEdit.meatKg || prodStageEdit.meatKg <= 0 || !prodStageEdit.fatPercent || prodStageEdit.fatPercent <= 0)) {
      showToast('Enter a meat weight and fat % first'); return;
    }
    if (t === 'recipe') {
      if (!prodForm.children || prodForm.children.length === 0) { showToast('Do the Fat calculator first to create children'); return; }
      if (!prodStageEdit.recipeName || !prodStageEdit.recipeName.trim()) { showToast('Give the recipe a name'); return; }
    }
    if (t === 'stuff_hang' && (!prodStageEdit.count || prodStageEdit.count <= 0)) {
      showToast('Enter how many salami you made today'); return;
    }
    prodForm.stages = prodForm.stages || [];
    const toSave = Object.assign({}, prodStageEdit);
    delete toSave.picker;
    if (!toSave.savedAt) toSave.savedAt = new Date().toISOString();  // real moment saved, for audit (separate from chosen date)
    prodForm.stages.push(toSave);
    // Fat calculator declares the children (divisions) for this run.
    if (t === 'fatcalc') {
      const n = toSave.childCount || 1;
      const m = toSave.meatKg || 0, fat = toSave.fatKg || 0, total = toSave.totalKg || 0;
      const childMeat = Math.round((m / n) * 100) / 100;
      const childFat = Math.round((fat / n) * 100) / 100;
      const childTotal = Math.round((total / n) * 100) / 100;
      const existing = prodForm.children || [];
      const kids = [];
      for (let i = 0; i < n; i++) {
        const letter = String.fromCharCode(65 + i);
        const prev = existing.find(function(c){ return c.letter === letter; }) || {};
        kids.push({
          letter: letter,
          code: (prodForm.batchCode || '') + letter,
          meatKg: childMeat, fatKg: childFat, totalKg: childTotal,
          recipe: prev.recipe || null, saltGrams: prev.saltGrams, saltPercent: prev.saltPercent,
          minced: prev.minced || false, stuffed: prev.stuffed || null
        });
      }
      prodForm.children = kids;
    }
    if (t === 'recipe' && prodForm.children) {
      const ch = prodForm.children.find(function(c){ return c.letter === toSave.childLetter; });
      if (ch) {
        // store recipe with the final (possibly edited) amounts and the ratio definitions
        ch.recipe = {
          name: toSave.recipeName,
          lines: (toSave.lines || []).map(function(l){ return {name:l.name, type:l.type, value:l.value, unit:l.unit, amount:l.amount}; })
        };
        const saltLine = (toSave.lines || []).find(function(l){ return l.name && l.name.toLowerCase() === 'salt'; });
        if (saltLine) { ch.saltGrams = saltLine.amount; }
      }
    }
    prodStageEdit = null;
    saveAndStay();
  });
  saveBar.appendChild(saveBtn);
  const cancelBtn = btn('', 'Cancel', function(){ prodStageEdit = null; renderProductionForm(); });
  saveBar.appendChild(cancelBtn);
  v.appendChild(saveBar);
}

function saveAndStay() {
  if (!prodEditId) return;
  productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
  saveData();
  showToast('Saved');
  const fresh = productionRecords.find(function(r){ return r.id === prodEditId; });
  if (fresh) prodForm = JSON.parse(JSON.stringify(fresh));
  renderProductionForm();
}

function saveAndReturn() {
  if (!prodEditId) { prodForm = null; renderProduction(); return; }
  productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
  saveData();
  showToast('Saved');
  prodForm = null; prodEditId = null; prodStageEdit = null;
  renderProduction();
}

    empty.appendChild(p('', 'No finished runs yet.'));
    v.appendChild(empty);

  }
  fin.forEach(function(r){ v.appendChild(productionCardSummary(r)); });
}

function nextFridayString() {
  const d = new Date();
  const day = d.getDay();
  const daysToFri = (5 - day + 7) % 7;
  d.setDate(d.getDate() + (daysToFri === 0 ? 7 : daysToFri));
  return d.toISOString().split('T')[0];
}

function hideAllExceptClean() {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'none';
  if(document.getElementById('view-daily'))document.getElementById('view-daily').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  document.getElementById('view-wetmeat').style.display = 'none';
  document.getElementById('view-delivery').style.display = 'none';
  if(document.getElementById('view-pest'))document.getElementById('view-pest').style.display = 'none';
  if(document.getElementById('view-prod'))document.getElementById('view-prod').style.display = 'none';
  document.getElementById('view-clean').style.display = 'block';
}

function renderPeriodicCleans() {
  currentView = 'clean';
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');

  const hdr = div('header-bar');
  const hdrLeft = div('');
  hdrLeft.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Periodic Cleans'));
  const building = periodicCleans.filter(function(c){ return c.status === 'building'; });
  const ready = periodicCleans.filter(function(c){ return c.status === 'ready' || c.status === 'in_progress'; });
  const done = periodicCleans.filter(function(c){ return c.status === 'completed'; });
  hdrLeft.appendChild(p('muted', building.length + ' building · ' + ready.length + ' ready/in progress · ' + done.length + ' completed'));
  hdr.appendChild(hdrLeft);
  const newBtn = btn('btn-primary', '+ New list', function(){
    cleanForm = blankCleanList();
    cleanForm.forDate = nextFridayString();
    cleanEditId = null;
    cleanRunMode = false;
    renderCleanForm();
  });
  hdr.appendChild(newBtn);
  v.appendChild(hdr);

  if (periodicCleans.length === 0) {
    const empty = div('empty-state');
    empty.appendChild(el('h3', {}, 'No cleaning lists yet'));
    empty.appendChild(p('', 'Start a new list for your staff member to work through.'));
    const b = btn('btn-primary big-btn', '+ New cleaning list', function(){
      cleanForm = blankCleanList();
      cleanForm.forDate = nextFridayString();
      cleanEditId = null;
      cleanRunMode = false;
      renderCleanForm();
    });
    empty.appendChild(b);
    v.appendChild(empty);
    return;
  }

  // Building (Robert side)
  if (building.length > 0) {
    const sec = div('');
    sec.appendChild(el('h3', {style:'font-size:14px;font-weight:600;color:#27500a;margin:1rem 0 8px;'}, 'Building (you)'));
    building.sort(function(a,b){ return (b.forDate||'').localeCompare(a.forDate||''); }).forEach(function(r){
      sec.appendChild(cleanCardSummary(r));
    });
    v.appendChild(sec);
  }
  // Ready or in progress (staff side)
  if (ready.length > 0) {
    const sec = div('');
    sec.appendChild(el('h3', {style:'font-size:14px;font-weight:600;color:#633806;margin:1.5rem 0 8px;'}, 'Ready for staff'));
    ready.sort(function(a,b){ return (b.forDate||'').localeCompare(a.forDate||''); }).forEach(function(r){
      sec.appendChild(cleanCardSummary(r));
    });
    v.appendChild(sec);
  }
  if (done.length > 0) {
    const linkBtn = document.createElement('button');
    linkBtn.style.cssText = 'background:none;border:none;color:#888;font-size:12px;cursor:pointer;text-decoration:underline;display:block;margin:1.5rem auto 0;';
    linkBtn.textContent = 'View completed lists (' + done.length + ')';
    linkBtn.addEventListener('click', renderCompletedCleansList);
    v.appendChild(linkBtn);
  }
}

function cleanCardSummary(r) {
  const card = div('card');
  card.style.cssText = 'cursor:pointer;margin-bottom:10px;';
  const top = div('row-sb');
  top.style.marginBottom = '6px';
  const left = div(''); left.style.flex = '1';
  left.appendChild(el('span', {style:'font-size:15px;font-weight:600;color:#1a1a1a;'}, 'For ' + fmtDate(r.forDate)));
  if (r.staffName) left.appendChild(el('span', {className:'muted'}, ' · ' + r.staffName));
  top.appendChild(left);
  const statusMap = {building:['#faeeda','#633806','Building'], ready:['#e8f4e3','#27500a','Ready'], in_progress:['#fff8f0','#854f0b','In progress'], completed:['#eaf3de','#27500a','Completed']};
  const sm = statusMap[r.status] || statusMap.building;
  top.appendChild(el('span', {style:'background:'+sm[0]+';color:'+sm[1]+';font-size:11px;padding:3px 10px;border-radius:8px;white-space:nowrap;'}, sm[2]));
  card.appendChild(top);
  const total = (r.jobs || []).length;
  const doneCount = (r.jobs || []).filter(function(j){ return j.done; }).length;
  card.appendChild(p('muted', total + ' job' + (total===1?'':'s') + (total > 0 && r.status !== 'building' ? ' · ' + doneCount + '/' + total + ' done' : '')));
  card.addEventListener('click', function(){ openCleanList(r.id); });
  return card;
}

function openCleanList(id) {
  const r = periodicCleans.find(function(x){ return x.id === id; });
  if (!r) { renderPeriodicCleans(); return; }
  cleanForm = JSON.parse(JSON.stringify(r));
  cleanEditId = id;
  // If status is ready or in_progress, default to RUN mode for staff. Building = build mode for Robert.
  cleanRunMode = (r.status === 'ready' || r.status === 'in_progress');
  renderCleanForm();
}

function renderCleanForm() {
  if (!cleanForm) { renderPeriodicCleans(); return; }
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');

  if (cleanRunMode) {
    renderCleanRunMode();
    return;
  }

  // ── BUILD MODE (Robert) ─────────────────────────────────────────────────────
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, cleanEditId ? 'Edit cleaning list' : 'Build cleaning list'));
  const backBtn = btn('', '← Back', function(){ cleanForm = null; cleanEditId = null; renderPeriodicCleans(); });
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  // Date + staff name card
  const dateCard = div('card');
  const dateGrid = div('grid2');
  const forField = div('field');
  forField.appendChild(label('Cleaning day (when she\'ll do it)'));
  const forInp = input({type:'date', value: cleanForm.forDate || nextFridayString()});
  forInp.addEventListener('change', function(e){ cleanForm.forDate = e.target.value; });
  forField.appendChild(forInp);
  dateGrid.appendChild(forField);
  const staffField = div('field');
  staffField.appendChild(label('Staff member name (optional)'));
  const staffInp = input({type:'text', value: cleanForm.staffName || '', placeholder:'e.g. Mary'});
  staffInp.addEventListener('input', function(e){ cleanForm.staffName = e.target.value; });
  staffField.appendChild(staffInp);
  dateGrid.appendChild(staffField);
  dateCard.appendChild(dateGrid);
  v.appendChild(dateCard);

  // Jobs section
  v.appendChild(p('section-title', 'Jobs on this list'));
  const jobsContainer = div('');
  v.appendChild(jobsContainer);

  function renderJobs() {
    jobsContainer.innerHTML = '';
    if (!cleanForm.jobs || cleanForm.jobs.length === 0) {
      const empty = div('card');
      empty.style.cssText = 'text-align:center;padding:1.5rem;color:#888;';
      empty.appendChild(p('', 'No jobs added yet. Use the buttons below.'));
      jobsContainer.appendChild(empty);
    }
    (cleanForm.jobs || []).forEach(function(job, idx) {
      const jCard = div('card');
      const jTop = div('row-sb'); jTop.style.marginBottom = '8px';
      const titleSide = div('');
      titleSide.appendChild(el('span', {className:'muted'}, 'Job ' + (idx+1)));
      titleSide.appendChild(el('p', {style:'font-size:14px;font-weight:600;margin:2px 0 0;'}, job.title));
      jTop.appendChild(titleSide);
      const rmBtn = btn('btn-sm btn-danger', '✕ Remove', function(){
        cleanForm.jobs = cleanForm.jobs.filter(function(j){ return j.id !== job.id; });
        renderJobs();
      });
      jTop.appendChild(rmBtn);
      jCard.appendChild(jTop);

      // Show subtasks (read-only here, just for reference)
      const sub = div('');
      sub.style.cssText = 'background:#f9fdf8;border-radius:6px;padding:8px 10px;font-size:12px;color:#666;';
      sub.appendChild(el('p', {style:'font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#888;margin:0 0 6px;'}, job.subtasks.length + ' step' + (job.subtasks.length===1?'':'s')));
      job.subtasks.forEach(function(st){
        const row = document.createElement('p');
        const isHL = (job.highlights || []).some(function(h){ return st.text.toLowerCase().includes(h.toLowerCase()); });
        row.style.cssText = 'font-size:12px;margin:2px 0;color:' + (isHL ? '#a83400' : '#444') + ';' + (isHL ? 'font-weight:600;' : '');
        row.textContent = '• ' + st.text + (isHL ? ' ⚠' : '');
        sub.appendChild(row);
      });
      jCard.appendChild(sub);

      // Add custom step
      const addStepRow = div('row');
      addStepRow.style.cssText = 'margin-top:8px;gap:6px;';
      const stepInp = input({type:'text', placeholder:'Add a step to this job...', style:'flex:1;font-size:12px;padding:6px 10px;'});
      const addStepBtn = btn('add-link', '+ Step', function(){
        const text = stepInp.value.trim(); if (!text) return;
        job.subtasks.push({id: uid(), text: text, done: false});
        stepInp.value = '';
        renderJobs();
      });
      stepInp.addEventListener('keydown', function(e){ if (e.key === 'Enter') addStepBtn.click(); });
      addStepRow.appendChild(stepInp); addStepRow.appendChild(addStepBtn);
      jCard.appendChild(addStepRow);

      jobsContainer.appendChild(jCard);
    });
  }
  renderJobs();

  // Add job picker
  v.appendChild(p('section-title', 'Add a job'));
  const pickerCard = div('card');
  const pickerRow = div('row'); pickerRow.style.gap = '8px';
  const picker = document.createElement('select');
  picker.style.cssText = 'flex:1;';
  const blankOpt = document.createElement('option'); blankOpt.value=''; blankOpt.textContent='— pick from library —'; picker.appendChild(blankOpt);
  Object.keys(CLEAN_TEMPLATES).forEach(function(key){
    const op = document.createElement('option');
    op.value = key;
    op.textContent = CLEAN_TEMPLATES[key].title;
    picker.appendChild(op);
  });
  const addFromLibBtn = btn('btn-primary', '+ Add', function(){
    if (!picker.value) { showToast('Pick a job first'); return; }
    const tpl = CLEAN_TEMPLATES[picker.value];
    if (!tpl) return;
    cleanForm.jobs = cleanForm.jobs || [];
    cleanForm.jobs.push({
      id: uid(),
      title: tpl.title,
      templateKey: picker.value,
      highlights: (tpl.highlights || []).slice(),
      subtasks: tpl.steps.map(function(s){ return {id: uid(), text: s, done: false}; }),
      done: false
    });
    picker.value = '';
    renderJobs();
  });
  pickerRow.appendChild(picker); pickerRow.appendChild(addFromLibBtn);
  pickerCard.appendChild(pickerRow);

  // Custom job
  const customRow = div('row'); customRow.style.cssText = 'margin-top:10px;gap:8px;';
  const customInp = input({type:'text', placeholder:'Or type a custom job title...', style:'flex:1;'});
  const addCustomBtn = btn('add-link', '+ Custom', function(){
    const title = customInp.value.trim(); if (!title) return;
    cleanForm.jobs = cleanForm.jobs || [];
    cleanForm.jobs.push({
      id: uid(),
      title: title,
      templateKey: null,
      highlights: [],
      subtasks: [],
      done: false
    });
    customInp.value = '';
    renderJobs();
  });
  customInp.addEventListener('keydown', function(e){ if (e.key === 'Enter') addCustomBtn.click(); });
  customRow.appendChild(customInp); customRow.appendChild(addCustomBtn);
  pickerCard.appendChild(customRow);
  v.appendChild(pickerCard);

  // Notes
  const notesCard = div('card');
  notesCard.appendChild(label('Notes for staff (optional)'));
  const notesInp = document.createElement('textarea');
  notesInp.rows = 2; notesInp.value = cleanForm.notes || '';
  notesInp.placeholder = 'Anything specific she should know about this clean...';
  notesInp.addEventListener('input', function(e){ cleanForm.notes = e.target.value; });
  notesCard.appendChild(notesInp);
  v.appendChild(notesCard);

  // Save bar
  const saveBar = div('save-bar');
  const saveDraftBtn = btn('', 'Save draft', function(){
    if ((cleanForm.jobs || []).length === 0) { showToast('Add at least one job before saving'); return; }
    cleanForm.status = 'building';
    persistClean();
    showToast('Draft saved');
    renderPeriodicCleans();
  });
  const markReadyBtn = btn('btn-primary', 'Mark ready for staff', function(){
    if ((cleanForm.jobs || []).length === 0) { showToast('Add at least one job first'); return; }
    if (!confirm('Mark this list ready for staff? You can still edit it after.')) return;
    cleanForm.status = 'ready';
    persistClean();
    showToast('List marked ready');
    renderPeriodicCleans();
  });
  saveBar.appendChild(saveDraftBtn); saveBar.appendChild(markReadyBtn);
  // Delete option (if editing existing)
  if (cleanEditId) {
    const delBtn = btn('btn-sm btn-danger', 'Delete list', function(){
      if (!confirm('Delete this cleaning list? This cannot be undone.')) return;
      periodicCleans = periodicCleans.filter(function(r){ return r.id !== cleanEditId; });
      saveData();
      showToast('List deleted');
      cleanForm = null; cleanEditId = null;
      renderPeriodicCleans();
    });
    delBtn.style.marginLeft = 'auto';
    saveBar.appendChild(delBtn);
  }
  v.appendChild(saveBar);
}

function persistClean() {
  const rec = Object.assign({}, cleanForm, {id: cleanEditId || cleanForm.id || uid()});
  if (cleanEditId) {
    periodicCleans = periodicCleans.map(function(r){ return r.id === cleanEditId ? rec : r; });
  } else {
    periodicCleans.push(rec);
    cleanEditId = rec.id;
  }
  saveData();
}

function renderCleanRunMode() {
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Cleaning list' + (cleanForm.staffName ? ' · ' + cleanForm.staffName : '')));
  const backBtn = btn('', '← Back', function(){ cleanForm = null; cleanEditId = null; cleanRunMode = false; renderPeriodicCleans(); });
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  // Date banner
  const banner = div('');
  banner.style.cssText = 'background:#e8f4e3;border:1px solid #b8d9b0;border-radius:8px;padding:10px 14px;margin-bottom:1rem;';
  banner.appendChild(el('p', {style:'font-size:15px;font-weight:600;color:#27500a;margin:0;'}, fmtDate(cleanForm.forDate)));
  if (cleanForm.notes) {
    banner.appendChild(el('p', {style:'font-size:12px;color:#666;margin:4px 0 0;font-style:italic;'}, '"' + cleanForm.notes + '"'));
  }
  v.appendChild(banner);

  // Progress
  const total = (cleanForm.jobs || []).length;
  const doneCount = (cleanForm.jobs || []).filter(function(j){ return j.done; }).length;
  const progressEl = document.createElement('p');
  progressEl.style.cssText = 'font-size:13px;font-weight:500;color:#27500a;text-align:center;margin:0 0 1rem;';
  progressEl.textContent = doneCount + ' of ' + total + ' jobs done';
  v.appendChild(progressEl);

  // Toggle build/run mode for Robert if he opened a ready list
  const modeRow = div('');
  modeRow.style.cssText = 'text-align:right;margin-bottom:8px;';
  const editBtn = document.createElement('button');
  editBtn.style.cssText = 'font-size:11px;color:#888;background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;cursor:pointer;';
  editBtn.textContent = '✎ Edit list';
  editBtn.addEventListener('click', function(){
    cleanRunMode = false;
    renderCleanForm();
  });
  modeRow.appendChild(editBtn);
  v.appendChild(modeRow);

  // Jobs as collapsible headings
  (cleanForm.jobs || []).forEach(function(job, idx) {
    const jCard = div('card');
    jCard.style.cssText = 'margin-bottom:8px;padding:0;overflow:hidden;' + (job.done ? 'background:#eaf3de;' : '');

    // Heading row — big tick
    const head = document.createElement('div');
    head.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;';
    const tick = document.createElement('input');
    tick.type = 'checkbox';
    tick.checked = !!job.done;
    tick.style.cssText = 'width:26px;height:26px;flex-shrink:0;accent-color:#3a6b2a;cursor:pointer;';
    tick.addEventListener('change', function(e) {
      job.done = e.target.checked;
      // When heading is ticked, mark all subtasks as done (auto). Untick = unmark all.
      (job.subtasks || []).forEach(function(st){ st.done = e.target.checked; });
      if (cleanForm.status === 'ready') cleanForm.status = 'in_progress';
      // Recalc completion
      const allDone = (cleanForm.jobs || []).every(function(j){ return j.done; });
      if (allDone) cleanForm.status = 'completed';
      persistClean();
      renderCleanRunMode();
    });
    tick.addEventListener('click', function(e){ e.stopPropagation(); });
    head.appendChild(tick);
    const titleSpan = document.createElement('span');
    titleSpan.style.cssText = 'flex:1;font-size:15px;font-weight:600;color:' + (job.done ? '#888;text-decoration:line-through;' : '#1a1a1a;');
    titleSpan.textContent = job.title;
    head.appendChild(titleSpan);
    const expandBtn = document.createElement('span');
    expandBtn.style.cssText = 'font-size:11px;color:#888;flex-shrink:0;';
    expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▼' : '';
    head.appendChild(expandBtn);

    // Detail panel — collapsed by default
    const detail = document.createElement('div');
    detail.style.cssText = 'display:none;background:#f9fdf8;border-top:1px solid #e0e0dc;padding:10px 16px 14px;';
    (job.subtasks || []).forEach(function(st){
      const stRow = div('');
      stRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:5px 0;';
      const stChk = document.createElement('input');
      stChk.type = 'checkbox';
      stChk.checked = !!st.done;
      stChk.style.cssText = 'width:18px;height:18px;flex-shrink:0;accent-color:#3a6b2a;cursor:pointer;margin-top:2px;';
      stChk.addEventListener('change', function(e){
        st.done = e.target.checked;
        // If all subtasks done, auto-tick heading
        const allSubDone = job.subtasks.every(function(x){ return x.done; });
        job.done = allSubDone;
        if (cleanForm.status === 'ready') cleanForm.status = 'in_progress';
        const allDone = (cleanForm.jobs || []).every(function(j){ return j.done; });
        if (allDone) cleanForm.status = 'completed';
        persistClean();
        renderCleanRunMode();
      });
      stChk.addEventListener('click', function(e){ e.stopPropagation(); });
      const stTxt = document.createElement('span');
      const isHL = (job.highlights || []).some(function(h){ return st.text.toLowerCase().includes(h.toLowerCase()); });
      stTxt.style.cssText = 'font-size:13px;flex:1;color:' + (isHL ? '#a83400' : (st.done ? '#888;text-decoration:line-through' : '#1a1a1a')) + ';' + (isHL ? 'font-weight:600;' : '');
      stTxt.textContent = st.text + (isHL ? ' ⚠' : '');
      stRow.appendChild(stChk); stRow.appendChild(stTxt);
      detail.appendChild(stRow);
    });

    head.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (detail.style.display === 'none') {
        detail.style.display = 'block';
        expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▲' : '';
      } else {
        detail.style.display = 'none';
        expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▼' : '';
      }
    });

    jCard.appendChild(head);
    if ((job.subtasks || []).length > 0) jCard.appendChild(detail);
    v.appendChild(jCard);
  });

  // Submit completed button
  if (cleanForm.status !== 'completed') {
    const submitBar = div('save-bar');
    submitBar.style.marginTop = '1.5rem';
    const submitBtn = btn('btn-primary', '✓ Submit as completed', function(){
      const total = (cleanForm.jobs || []).length;
      const doneCount = (cleanForm.jobs || []).filter(function(j){ return j.done; }).length;
      if (doneCount < total) {
        if (!confirm(doneCount + ' of ' + total + ' jobs ticked. Submit anyway?')) return;
      }
      cleanForm.status = 'completed';
      cleanForm.completedDate = today();
      persistClean();
      showToast('Cleaning list completed');
      cleanForm = null; cleanEditId = null; cleanRunMode = false;
      renderPeriodicCleans();
    });
    submitBar.appendChild(submitBtn);
    v.appendChild(submitBar);
  } else {
    const doneBanner = div('');
    doneBanner.style.cssText = 'background:#eaf3de;border:1px solid #b8d9b0;border-radius:8px;padding:14px;margin-top:1.5rem;text-align:center;';
    doneBanner.appendChild(el('p', {style:'font-size:14px;font-weight:600;color:#27500a;margin:0;'}, '✓ Completed' + (cleanForm.completedDate ? ' on ' + fmtDate(cleanForm.completedDate) : '')));
    v.appendChild(doneBanner);
  }
}

function renderCompletedCleansList() {
  currentView = 'clean';
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Completed cleaning lists'));
  const backBtn = btn('', '← Back', renderPeriodicCleans);
  hdr.appendChild(backBtn);
  v.appendChild(hdr);
  const done = periodicCleans.filter(function(r){ return r.status === 'completed'; }).sort(function(a,b){ return (b.completedDate||b.forDate||'').localeCompare(a.completedDate||a.forDate||''); });
  if (done.length === 0) {
    const empty = div('empty-state');
    empty.appendChild(p('', 'No completed lists yet.'));
    v.appendChild(empty);
    return;
  }
  done.forEach(function(r){ v.appendChild(cleanCardSummary(r)); });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadData();
  migrateShortCodes();
  checkAndFixSeasons();
  renderList();
})();
</script>
</body></html>
