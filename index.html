let intakes = [], deliveries = [], dailyRecords = [], pestRecords = [], productionRecords = [], periodicCleans = [], estates = [], processors = [], parts = [
  'Whole','Leg','Shoulder','Breast','Saddle','Haunch','Loin','Carcass','Mixed cuts'
];
let generalTasks = [];  // loose quick-capture tasks, not tied to any record
let dailyChecks = [];   // standalone opening/closing hygiene checks, one record per work day
let venisonRuns = [];   // whole-carcass venison breakdowns; lanes = product children
// Skin/tube sizes for stuffing — each carries its standard dry time (weeks). Editable + addable.
// Dry time is a FORECAST; actual vac-pack date is logged so forecast vs actual can be compared.
let skinSizes = [
  {name:'Beer stick', weeks:2},

];

// ── Persistence ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    if (!sb) {
      if (typeof window.supabase !== 'undefined') {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } else {
        let retries = 0;
        const retry = async () => {
          await new Promise(r => setTimeout(r, 1000));
          if (typeof window.supabase !== 'undefined') {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          } else if (retries++ < 5) {
            return retry();
          } else {
            showToast('Could not connect to cloud — check internet and reload');
            return;
          }
        };
        await retry();
        if (!sb) return;
      }
    }

    const {data: intakeRows} = await sb.from('intakes').select('*');
    if (intakeRows && intakeRows.length) {
      intakes = intakeRows.map(r => r.data);
    }

    const {data: deliveryRows} = await sb.from('deliveries').select('*');
    if (deliveryRows && deliveryRows.length) {
      deliveries = deliveryRows.filter(r => !r.data._type).map(r => r.data);
      dailyRecords = deliveryRows.filter(r => r.data._type === 'daily').map(r => r.data);
      pestRecords = deliveryRows.filter(r => r.data._type === 'pest').map(r => r.data);
      productionRecords = deliveryRows.filter(r => r.data._type === 'production').map(r => r.data);
      periodicCleans = deliveryRows.filter(r => r.data._type === 'periodic_clean').map(r => r.data);
      dailyChecks = deliveryRows.filter(r => r.data._type === 'dailychecks').map(r => r.data);
      venisonRuns = deliveryRows.filter(r => r.data._type === 'venison').map(r => r.data);
    }

    const {data: configRows} = await sb.from('app_config').select('*');
    if (configRows) {
      for (const row of configRows) {
        if (row.key === 'estates' && row.data.length) estates = row.data;
        if (row.key === 'processors' && row.data.length) processors = row.data;
        if (row.key === 'parts' && row.data.length) parts = row.data;
        if (row.key === 'species' && row.data.length) species = row.data;
        if (row.key === 'speciesFat' && row.data) speciesFat = Object.assign(speciesFat, row.data);
        if (row.key === 'recipeLibrary' && row.data && row.data.length) recipeLibrary = row.data;
        if (row.key === 'generalTasks' && row.data) generalTasks = row.data;
        if (row.key === 'skinSizes' && row.data && row.data.length) skinSizes = row.data;
      }
    }

    if (intakes.length === 0) {
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) {
          const d = JSON.parse(raw);
          if (d.intakes && d.intakes.length) {
            intakes = d.intakes;
            deliveries = d.deliveries || [];
            estates = d.estates || [];
            processors = d.processors || [];
            if (d.parts && d.parts.length) parts = d.parts;
            if (d.species && d.species.length) species = d.species;
            showToast('Migrating local records to cloud...');
            await saveData();
            return;
          }
        }
      } catch(e) {}
    }

  } catch(e) {
    console.error('Load error', e);
    showToast('Could not connect to cloud — check internet connection');
  }
}

async function saveData() {
  try {
    // Fold the live working copy of an open run back into the saved array BEFORE
    // persisting. prodForm is a deep copy made on open; without this, any save
    // triggered from a prodForm context (e.g. the make/tick screen) would write
    // the stale pre-edit record over the cloud and lose the edits.
    if (prodEditId && prodForm) {
      productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
    }
    showStatus('saving');

    for (const intake of intakes) {
      await sb.from('intakes').upsert({id: intake.id, data: intake});
    }

    for (const delivery of deliveries) {
      await sb.from('deliveries').upsert({id: delivery.id, data: delivery});
    }

    await sb.from('app_config').upsert({key: 'estates', data: estates});
    await sb.from('app_config').upsert({key: 'processors', data: processors});
    await sb.from('app_config').upsert({key: 'parts', data: parts});
    await sb.from('app_config').upsert({key: 'species', data: species});
    await sb.from('app_config').upsert({key: 'speciesFat', data: speciesFat});
    await sb.from('app_config').upsert({key: 'recipeLibrary', data: recipeLibrary});
    await sb.from('app_config').upsert({key: 'generalTasks', data: generalTasks});
    await sb.from('app_config').upsert({key: 'skinSizes', data: skinSizes});
    for (const dr of dailyRecords) {
      await sb.from('deliveries').upsert({id: 'daily_' + dr.id, data: {...dr, _type: 'daily'}});
    }
    for (const pr of pestRecords) {
      await sb.from('deliveries').upsert({id: 'pest_' + pr.id, data: {...pr, _type: 'pest'}});
    }
    for (const r of productionRecords) {
      await sb.from('deliveries').upsert({id: 'prod_' + r.id, data: {...r, _type: 'production'}});
    }
    for (const r of periodicCleans) {
      await sb.from('deliveries').upsert({id: 'clean_' + r.id, data: {...r, _type: 'periodic_clean'}});
    }
    for (const r of dailyChecks) {
      await sb.from('deliveries').upsert({id: 'dchk_' + r.id, data: {...r, _type: 'dailychecks'}});
    }
    for (const r of venisonRuns) {
      await sb.from('deliveries').upsert({id: 'ven_' + r.id, data: {...r, _type: 'venison'}});
    }

    showStatus('saved');
  } catch(e) {
    console.error('Save error', e);
    showStatus('error');
    showToast('Cloud save failed — check internet connection');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const fmtDate = d => { if (!d) return ''; const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };
const today = () => new Date().toISOString().split('T')[0];

function seasonCode(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
  const y = d.getFullYear(), m = d.getMonth() + 1;
  const openYear = (m >= 9) ? y : (m <= 2) ? y - 1 : y;
  const closeYY = String(openYear + 1).slice(-2);
  return `${openYear}${closeYY}`;
}

function fmtSeason(c) {
  return c && c.length === 6 ? c.slice(0,4) + '/' + c.slice(4) : c;
}

function nextNum(season, list) {
  const prefix = season + '-';
  const rel = (list||[]).filter(i => i.batchCode && i.batchCode.startsWith(prefix));
  if (!rel.length) return 1;
  const nums = rel.map(i => parseInt(i.batchCode.slice(prefix.length)) || 0);
  return Math.max(...nums) + 1;
}

function migrateShortCodes() {
  let changed = false;
  intakes = intakes.map(r => {
    if (r.season && r.season.length === 4) {
      const fullSeason = '20' + r.season;
      const fixedCode = (r.batchCode||'').startsWith(r.season + '-')
        ? fullSeason + '-' + r.batchCode.slice(r.season.length + 1)
        : r.batchCode;
      changed = true;
      return {...r, season: fullSeason, batchCode: fixedCode};
    }
    return r;
  });
  if (changed) saveData();
}

function seasonFromBatch(batchCode) {
  const parts = (batchCode||'').split('-');
  const s = parts[0];
  return s.length === 6 ? s : null;
}

function describeSeason(code) {
  if (!code || code.length !== 6) return '';
  const openYear = code.slice(0,4);
  const closeYY = code.slice(4);
  const closeYear = '20' + closeYY;
  return `Sept ${openYear} – Jan ${closeYear}`;
}

function tempOk(item) {
  const t = parseFloat(item.temp);
  if (isNaN(t)) return null;
  return item.storage === 'Chilled' ? t <= 4 : t <= -18;
}

function getName(list, id) {
  const x = list.find(i => i.id === id);
  return x ? x.name : '—';
}

function newItem() {
  return { id: uid(), species: 'Pheasant', custom: '', part: parts[0]||'', storage: 'Chilled', qty: '', unit: 'kg', temp: '', pkg: 'Pass' };
}

function blankForm() {
  const c = seasonCode(today());
  const n = nextNum(c, intakes);
  return { date: today(), season: c, batchCode: `${c}-${n}`, batchOverride: false, estateId: '', processorId: '', ref: '', items: [newItem()], notes: '' };
}

function checkDups(f, eid) {
  const w = [], o = intakes.filter(r => r.id !== eid);
  if (f.batchCode && o.some(r => r.batchCode === f.batchCode)) w.push(`Batch code ${f.batchCode} already exists.`);
  if (f.date && f.estateId && f.processorId) {
    const c = o.find(r => r.date === f.date && r.estateId === f.estateId && r.processorId === f.processorId);
    if (c) w.push(`Same estate & processor already recorded on ${f.date} (${c.batchCode}).`);
  }
  if (f.ref && f.ref.trim() && o.some(r => r.ref && r.ref.trim() === f.ref.trim() && r.date === f.date))
    w.push(`Processor ref "${f.ref}" already used on ${f.date}.`);
  return w;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

function showStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  if (s === 'saving') el.innerHTML = `<span class="dot dot-grey"></span> Saving...`;
  else if (s === 'saved') el.innerHTML = `<span class="dot dot-green"></span> Saved to cloud`;
  else if (s === 'error') el.innerHTML = `<span class="dot dot-red"></span> Save failed`;
  if (s !== 'saving') {
    clearTimeout(saveStatusTimer);
    saveStatusTimer = setTimeout(() => { if(el) el.innerHTML = `<span class="dot dot-grey"></span> Auto-saves to cloud`; }, 3000);
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function div(cls, ...children) { return el('div', {className: cls}, ...children); }
function p(cls, text) { const e = document.createElement('p'); e.className = cls||''; e.textContent = text||''; return e; }
function span(cls, text) { const e = document.createElement('span'); e.className = cls||''; e.textContent = text||''; return e; }
function label(text, forId) { const e = document.createElement('label'); e.textContent = text; if(forId) e.htmlFor = forId; return e; }
function input(attrs) { return el('input', attrs); }
function select(opts, val, onChange) {
  const s = document.createElement('select');
  for (const [v,t] of opts) { const o = document.createElement('option'); o.value = v; o.textContent = t; if(v===val) o.selected=true; s.appendChild(o); }
  s.addEventListener('change', e => onChange(e.target.value));
  return s;
}
function btn(cls, text, onClick) { const b = document.createElement('button'); b.className = cls; b.textContent = text; b.addEventListener('click', onClick); return b; }

function makeDropdown(container, labelText, entities, selectedId, onSelect, onAdd, hasFSA) {
  container.innerHTML = '';
  const lbl = document.createElement('label');
  lbl.textContent = labelText; lbl.style.cssText = 'font-size:12px;color:#666;display:block;margin-bottom:4px;';
  container.appendChild(lbl);

  const row = div('row');
  const sel = document.createElement('select');
  sel.style.flex = '1';
  const blank = document.createElement('option'); blank.value = ''; blank.textContent = `— select ${labelText.toLowerCase()} —`; sel.appendChild(blank);
  for (const e of entities) { const o = document.createElement('option'); o.value = e.id; o.textContent = e.name + (hasFSA && e.fsa ? ` (FSA: ${e.fsa})` : hasFSA ? ' (no FSA)' : ''); if(e.id===selectedId) o.selected=true; sel.appendChild(o); }
  sel.addEventListener('change', e => { onSelect(e.target.value); renderFSAHint(); });
  row.appendChild(sel);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-link'; addBtn.textContent = '+ Add new';
  addBtn.addEventListener('click', () => { subForm.style.display = subForm.style.display==='none'?'block':'none'; });
  row.appendChild(addBtn);
  container.appendChild(row);

  const hint = p('storage-note','');
  const renderFSAHint = () => {
    if (!hasFSA) return;
    const found = entities.find(e => e.id === sel.value);
    hint.textContent = found ? `FSA: ${found.fsa||'not registered'}` : '';
  };
  renderFSAHint();
  container.appendChild(hint);

  const subForm = div('sub-form'); subForm.style.display = 'none';
  const nameInput = input({type:'text', placeholder: labelText + ' name', style:'margin-bottom:8px;'});
  subForm.appendChild(nameInput);
  let fsaInput;
  if (hasFSA) {
    fsaInput = input({type:'text', placeholder:'FSA number (leave blank if none)', style:'margin-bottom:8px;'});
    subForm.appendChild(fsaInput);
  }
  const saveBtn = btn('btn-primary btn-sm', `Save ${labelText.toLowerCase()}`, () => {
    const name = nameInput.value.trim();
    if (!name) return;
    const entry = {id: uid(), name, fsa: hasFSA ? (fsaInput.value.trim()||'') : undefined};
    onAdd(entry);
    nameInput.value = ''; if(fsaInput) fsaInput.value = '';
    subForm.style.display = 'none';
    showToast(`${labelText} "${name}" saved`);
    saveData();
  });
  const cancelBtn = btn('', 'Cancel', () => { subForm.style.display = 'none'; nameInput.value = ''; if(fsaInput) fsaInput.value=''; });
  cancelBtn.style.marginLeft = '8px';
  subForm.appendChild(el('div', {}, saveBtn, cancelBtn));
  container.appendChild(subForm);
}

function renderTabs(activeTab) {
  const v = document.getElementById('view-tabs');
  v.innerHTML = '';
  const bar = div('tab-bar');
  bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:0;margin-bottom:1.5rem;border-bottom:2px solid #E7DFCE;';
  const tabsLeft = div('row');
  tabsLeft.style.gap = '0';
  const tabs = [['list','Intake records'],['daily','Daily Record'],['delivery','Finished Product'],['wetmeat','Wet Meat'],['pest','Pest Control'],['prod','Production'],['clean','Periodic Cleans'],['checks','Daily Checks'],['venison','Venison'],['manage','Manage']];
  for (const [id, label] of tabs) {
    const b = btn(`tab-btn${activeTab===id?' active':''}`, label, () => {
      if (id === 'list') renderList();
      else if (id === 'daily') renderDailyHome();
      else if (id === 'delivery') renderDeliveryList();
      else if (id === 'wetmeat') renderWetMeat();
      else if (id === 'pest') renderPestControl();
      else if (id === 'prod') renderProduction();
      else if (id === 'clean') renderPeriodicCleans();
      else if (id === 'checks') renderDailyChecks();
      else if (id === 'venison') renderVenison();
      else renderManage();
    });
    tabsLeft.appendChild(b);
  }
  bar.appendChild(tabsLeft);
  const saveBtn = btn('', '⬇ Save to Dropbox', exportData);
  saveBtn.style.cssText = 'color:#3a6b2a;border-color:#3a6b2a;font-size:12px;padding:5px 12px;margin-bottom:2px;white-space:nowrap;flex-shrink:0;';
  bar.appendChild(saveBtn);
  v.appendChild(bar);
  const existingPanel = document.getElementById('tasks-panel-global');
  if (existingPanel) existingPanel.remove();
  // Build outstanding tasks list — track parent record so we can mark done from here
  const allTodosGlobal = [];
  dailyRecords.forEach(r => {
    (r.todoList||[]).filter(t => !t.done).forEach(t => {
      allTodosGlobal.push({task: t, parentRecord: r});
    });
  });
  // Loose quick-capture tasks (no parent record). kind: 'fsa' (default) or 'app'
  generalTasks.filter(t => !t.done).forEach(t => {
    allTodosGlobal.push({task: t, parentRecord: null, isGeneral: true});
  });
  // Monthly pest control reminder (no parent record — clicks through to pest tab)
  if (typeof pestControlDoneThisMonth === 'function' && !pestControlDoneThisMonth()) {
    allTodosGlobal.unshift({task: {text:'🐭 Monthly pest control check due', addedDate: today(), _pestReminder: true}, parentRecord: null});
  }
  const globalPanel = document.createElement('div');
  globalPanel.id = 'tasks-panel-global';
  globalPanel.style.cssText = 'background:#fff8f0;border:1px solid #f0d4a8;border-radius:8px;padding:10px 14px;margin-bottom:12px;';
  const globalTitle = document.createElement('p');
  globalTitle.style.cssText = 'font-size:12px;font-weight:600;margin-bottom:8px;';
  globalTitle.style.color = allTodosGlobal.length > 0 ? '#633806' : '#27500a';
  globalTitle.textContent = allTodosGlobal.length > 0 ? '⚠️ Outstanding tasks — ' + allTodosGlobal.length + ' to do' : '✓ No outstanding tasks';
  globalPanel.appendChild(globalTitle);
  // Scrollable list — shows ALL tasks, scrolls if long
  const listWrap = document.createElement('div');
  listWrap.style.cssText = 'max-height:240px;overflow-y:auto;';
  allTodosGlobal.forEach(entry => {
    const task = entry.task;
    const parentRecord = entry.parentRecord;
    const isApp = entry.isGeneral && task.kind === 'app';
    const taskRow = document.createElement('div');
    taskRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid #f0d4a8;' + (task._pestReminder ? 'cursor:pointer;' : '');
    if (task._pestReminder) taskRow.addEventListener('click', renderPestControl);
    if (parentRecord || entry.isGeneral) {
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.style.cssText = 'width:20px;height:20px;accent-color:#3a6b2a;cursor:pointer;flex-shrink:0;margin-top:1px;';
      chk.addEventListener('change', async () => {
        task.done = true;
        task.doneDate = today();
        try { await saveData(); } catch(e) { console.warn('saveData failed:', e); }
        renderTabs(activeTab);
      });
      taskRow.appendChild(chk);
    } else {
      const circle = document.createElement('span'); circle.style.cssText = 'color:#d35400;flex-shrink:0;font-size:16px;line-height:1.2;'; circle.textContent = '○';
      taskRow.appendChild(circle);
    }
    const taskText = document.createElement('span'); taskText.style.cssText = 'font-size:13px;color:' + (isApp ? '#5566aa' : '#633806') + ';flex:1;';
    taskText.textContent = (isApp ? '🔧 ' : '') + task.text;
    taskRow.appendChild(taskText);
    // Re-tag button for general tasks (move FSA <-> App)
    if (entry.isGeneral && !task._pestReminder) {
      const tag = document.createElement('button');
      tag.textContent = isApp ? 'App note' : 'FSA';
      tag.title = 'Tap to switch — App notes are kept out of the FSA PDF';
      tag.style.cssText = 'flex-shrink:0;font-size:10px;border:1px solid ' + (isApp ? '#5566aa' : '#3a6b2a') + ';color:' + (isApp ? '#5566aa' : '#3a6b2a') + ';background:#fff;border-radius:10px;padding:2px 8px;cursor:pointer;';
      tag.addEventListener('click', async (e) => {
        e.stopPropagation();
        task.kind = isApp ? 'fsa' : 'app';
        try { await saveData(); } catch(err) { console.warn('saveData failed:', err); }
        renderTabs(activeTab);
      });
      taskRow.appendChild(tag);
    }
    const dateAdded = document.createElement('span'); dateAdded.style.cssText = 'font-size:10px;color:#aaa;white-space:nowrap;'; dateAdded.textContent = fmtDate(task.addedDate);
    taskRow.appendChild(dateAdded);
    listWrap.appendChild(taskRow);
  });
  globalPanel.appendChild(listWrap);
  // Quick add — with FSA / App note toggle. Works from any tab.
  if (!window._quickAddKind) window._quickAddKind = 'fsa';
  const addWrap = document.createElement('div'); addWrap.style.cssText = 'display:flex;gap:8px;margin-top:10px;align-items:center;';
  const kindBtn = document.createElement('button');
  function kindLabel(){ return window._quickAddKind === 'app' ? '🔧 App note' : 'FSA task'; }
  kindBtn.textContent = kindLabel();
  kindBtn.title = 'Tap to switch. App notes stay out of the FSA PDF.';
  function styleKind(){ const app = window._quickAddKind==='app'; kindBtn.style.cssText = 'flex-shrink:0;font-size:12px;border:1px solid ' + (app?'#5566aa':'#3a6b2a') + ';color:' + (app?'#5566aa':'#3a6b2a') + ';background:#fff;border-radius:6px;padding:8px 10px;cursor:pointer;'; }
  styleKind();
  kindBtn.addEventListener('click', function(){ window._quickAddKind = window._quickAddKind==='app'?'fsa':'app'; kindBtn.textContent = kindLabel(); styleKind(); });
  const addInput = document.createElement('input');
  addInput.type = 'text';
  addInput.placeholder = 'Add a task…';
  addInput.style.cssText = 'flex:1;padding:8px 10px;font-size:14px;border:1px solid #e0c9a0;border-radius:6px;';
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add';
  addBtn.style.cssText = 'background:#3a6b2a;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;';
  async function addQuickTask() {
    const text = addInput.value.trim();
    if (!text) return;
    generalTasks.push({id: 'gt_' + Date.now(), text: text, addedDate: today(), done: false, kind: window._quickAddKind});
    addInput.value = '';
    try { await saveData(); } catch(e) { console.warn('saveData failed:', e); }
    renderTabs(activeTab);
  }
  addBtn.addEventListener('click', addQuickTask);
  addInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); addQuickTask(); } });
  addWrap.appendChild(kindBtn); addWrap.appendChild(addInput); addWrap.appendChild(addBtn);
  globalPanel.appendChild(addWrap);
  v.appendChild(globalPanel);
}

function renderDailyForm2(step) {

function buildCheckSummaryCard(titleText, checks, state, doneCount, bgColor, textColor) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = 'margin-bottom:12px;';
  const cardHeader = document.createElement('div');
  cardHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
  const cardTitle = document.createElement('p');
  cardTitle.style.cssText = 'font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin:0;';
  cardTitle.textContent = titleText;
  const cardCount = document.createElement('span');
  cardCount.style.cssText = 'font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;background:' + bgColor + ';color:' + textColor + ';';
  cardCount.textContent = doneCount + ' / ' + checks.length + ' done';
  cardHeader.appendChild(cardTitle);
  cardHeader.appendChild(cardCount);
  card.appendChild(cardHeader);
  checks.forEach(check => {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid #f5f5f2;';
    const tickEl = document.createElement('span');
    const ticked = state && state[check];
    tickEl.style.cssText = 'font-size:14px;color:' + (ticked ? '#3a6b2a' : '#ddd') + ';flex-shrink:0;margin-top:1px;';
    tickEl.textContent = ticked ? '✓' : '○';
    const lblEl = document.createElement('span');
    lblEl.style.cssText = 'font-size:12px;color:' + (ticked ? '#1a1a1a' : '#aaa') + ';line-height:1.4;';
    lblEl.textContent = check;
    rowEl.appendChild(tickEl);
    rowEl.appendChild(lblEl);
    card.appendChild(rowEl);
  });
  return card;
}

    todoItemsEl.innerHTML = '';

      taskRow.appendChild(taskChk); taskRow.appendChild(taskTextEl); taskRow.appendChild(addedEl);

        const taskRow = document.createElement('div');
        taskRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:5px 0;opacity:0.5;';
        const tickSpan = document.createElement('span');
        tickSpan.style.cssText = 'color:#3a6b2a;font-size:14px;flex-shrink:0;';
        tickSpan.textContent = '✓';
        const taskTextEl2 = document.createElement('span');

        todoItemsEl.appendChild(taskRow);

  const addTaskRow = document.createElement('div');

      row.appendChild(numLbl); row.appendChild(nameInp); row.appendChild(qtyInp); row.appendChild(unitSel);

function renderWetMeat() {
  currentView = 'wetmeat';
  if(document.getElementById('view-pest'))document.getElementById('view-pest').style.display = 'none';
  if(document.getElementById('view-prod'))document.getElementById('view-prod').style.display = 'none';
  if(document.getElementById('view-clean'))document.getElementById('view-clean').style.display = 'none';
  if(document.getElementById('view-daily'))document.getElementById('view-daily').style.display = 'none';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  const v = document.getElementById('view-wetmeat');
  v.style.display = 'block';
  v.innerHTML = '';
  renderTabs('wetmeat');

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:16px;font-weight:600;margin:0;'}, 'Wet meat received'));
  hdr.appendChild(p('muted', 'Kilos received at intake by season and species'));
  v.appendChild(hdr);

  if (intakes.length === 0) {
    v.appendChild(p('muted', 'No intake records yet.'));
    return;
  }

  const summary = {};
  for (const record of intakes) {
    const s = record.season || 'Unknown';
    if (!summary[s]) summary[s] = {};
    for (const item of (record.items || [])) {
      const sp = item.species === 'Other' ? (item.custom || 'Other') : item.species;
      const kg = item.unit === 'kg' ? parseFloat(item.qty) || 0 : 0;
      summary[s][sp] = (summary[s][sp] || 0) + kg;
    }
  }

  const seasons = Object.keys(summary).sort().reverse();

  for (const season of seasons) {
    const seasonDesc = describeSeason(season) || fmtSeason(season) || season;
    const hdrEl = div('wm-season-header');
    hdrEl.textContent = seasonDesc;
    v.appendChild(hdrEl);

    const table = document.createElement('table');
    table.className = 'wm-table';
    table.style.borderRadius = '0 0 8px 8px';
    table.style.overflow = 'hidden';
    const thead = document.createElement('thead');
    const hrow = document.createElement('tr');
    for (const h of ['Species', 'Total kg received']) {
      const th = document.createElement('th');
      th.textContent = h; hrow.appendChild(th);
    }
    thead.appendChild(hrow); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const speciesData = summary[season];
    const speciesList = Object.keys(speciesData).sort();
    let total = 0;

    for (const sp of speciesList) {
      const kg = speciesData[sp];
      total += kg;
      const row = document.createElement('tr');
      const tdSp = document.createElement('td'); tdSp.textContent = sp;
      const tdKg = document.createElement('td'); tdKg.textContent = kg % 1 === 0 ? `${kg} kg` : `${kg.toFixed(2)} kg`;
      row.appendChild(tdSp); row.appendChild(tdKg);
      tbody.appendChild(row);
    }

    const totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    const tdTotalLbl = document.createElement('td'); tdTotalLbl.textContent = 'Total';
    const tdTotalKg = document.createElement('td'); tdTotalKg.textContent = total % 1 === 0 ? `${total} kg` : `${total.toFixed(2)} kg`;
    totalRow.appendChild(tdTotalLbl); totalRow.appendChild(tdTotalKg);
    tbody.appendChild(totalRow);

    table.appendChild(tbody);
    v.appendChild(table);
  }
}

function renderForm() {
  currentView = 'form';
  if(document.getElementById('view-pest'))document.getElementById('view-pest').style.display = 'none';
  if(document.getElementById('view-prod'))document.getElementById('view-prod').style.display = 'none';
  if(document.getElementById('view-clean'))document.getElementById('view-clean').style.display = 'none';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-manage').style.display = 'none';
  const v = document.getElementById('view-form');
  v.style.display = 'block';
  v.innerHTML = '';

  let confirmMode = false;

  const hdr = div('header-bar');
  const backBtn = btn('back-btn', '← All intakes', () => { form = null; editId = null; renderList('records'); });
  hdr.appendChild(backBtn);
  const titleEl = el('h2', {}, editId ? `Edit ${form.batchCode}` : 'New intake record');
  titleEl.style.margin = '0';
  hdr.appendChild(titleEl);
  const statusEl = el('span', {id:'save-status', className:'status muted'});
  statusEl.innerHTML = `<span class="dot dot-grey"></span> Auto-saves here`;
  hdr.appendChild(statusEl);
  v.appendChild(hdr);

  const hcard = div('card');
  const grid = div('grid2');

  function buildSeasons() {
    const now = new Date();
    const curYear = now.getFullYear();
    const seasons = [];
    for (let openYear = curYear - 3; openYear <= curYear + 2; openYear++) {
      const closeYear = openYear + 1;
      const code = `${openYear}${String(closeYear).slice(-2)}`;
      const label = `Spring, Summer & Autumn ${openYear} through to Season End 1 Feb ${closeYear}`;
      seasons.push({code, label});
    }
    return seasons;
  }
  const seasonList = buildSeasons();

  const dateField = div('field span2');
  dateField.appendChild(label('Date of delivery'));
  const dateInput = input({type:'date', value: form.date});
  dateInput.addEventListener('change', e => {
    form.date = e.target.value;
    const c = seasonCode(form.date);
    form.season = c;
    seasonSel.value = c;
    updateBatchDisplay();
  });
  dateField.appendChild(dateInput);
  grid.appendChild(dateField);

  const seasonField = div('field span2');
  seasonField.appendChild(label('Season'));
  const seasonSel = document.createElement('select');
  seasonSel.style.width = '100%';
  for (const s of seasonList) {
    const o = document.createElement('option');
    o.value = s.code;
    o.textContent = s.label;
    if (s.code === form.season) o.selected = true;
    seasonSel.appendChild(o);
  }
  if (!seasonList.find(s => s.code === form.season)) {
    const o = document.createElement('option');
    o.value = form.season;
    o.textContent = `Season ${fmtSeason(form.season)} (imported)`;
    o.selected = true;
    seasonSel.insertBefore(o, seasonSel.firstChild);
  }
  seasonSel.addEventListener('change', e => {
    form.season = e.target.value;
    updateBatchDisplay();
  });
  seasonField.appendChild(seasonSel);
  grid.appendChild(seasonField);

  const batchField = div('field span2');
  batchField.appendChild(label('Intake batch number for this season'));

  const existingNum = form.batchCode ? (form.batchCode.split('-')[1] || '') : '';
  const batchNumInput = input({type:'number', value: existingNum, placeholder: `Next: ${nextNum(form.season, intakes)}`, style:'font-size:16px;font-weight:600;width:120px;'});

  const batchDisplay = div('');
  batchDisplay.style.cssText = 'margin-top:8px;padding:10px 14px;background:#f0f7ee;border:1px solid #b8d9b0;border-radius:8px;display:flex;align-items:center;gap:10px;';

function doSave() {
  for (const item of form.items) {
    if (item.species === 'Other' && item.custom.trim()) {
      const name = item.custom.trim();
      if (!species.includes(name)) {
        species.splice(species.indexOf('Other'), 0, name);
        item.species = name;
        item.custom = '';
      } else {
        item.species = name;
        item.custom = '';
      }
    }
  }
  const rec = {...form, id: editId || uid()};
  if (editId) {
    intakes = intakes.map(r => r.id === editId ? rec : r);
  } else {
    intakes.push(rec);
  }
  saveData();
  form = null; editId = null;
  renderList('records');
  showToast('Record saved');
}

function startNew() {
  const c = seasonCode(today());
  const n = nextNum(c, intakes);
  form = { date: today(), season: c, batchCode: `${c}-${n}`, batchOverride: false, estateId: '', processorId: '', ref: '', items: [newItem()], notes: '' };
  editId = null;
  renderForm();
}

function startEdit(r) {
  form = JSON.parse(JSON.stringify(r));
  form.batchOverride = true;
  editId = r.id;
  renderForm();
}

function exportData() {
  const filename = `FSA-intake-records.json`;
  const data = JSON.stringify({intakes, deliveries, estates, processors, parts, species}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('Saved as FSA-intake-records.json — save to your Dropbox folder');
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.intakes) intakes = d.intakes;
      if (d.deliveries) deliveries = d.deliveries;
      if (d.estates) estates = d.estates;
      if (d.processors) processors = d.processors;
      if (d.parts && d.parts.length) parts = d.parts;
      if (d.species && d.species.length) species = d.species;
      migrateShortCodes();
      saveData();
      renderList();
      showToast(`Loaded ${intakes.length} records from file`);
    } catch(err) { showToast('Could not read file — is it the right format?'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function checkAndFixSeasons() {
  let fixed = 0;
  intakes = intakes.map(r => {
    const extracted = seasonFromBatch(r.batchCode);
    if (extracted && r.season !== extracted) {
      fixed++;
      return {...r, season: extracted};
    }
    return r;
  });
  if (fixed > 0) {
    saveData();
    showToast(`Fixed season code on ${fixed} record${fixed>1?'s':''}`);
  }
}

function processCodeFromDate(dateStr) {
  return (dateStr || today()).replace(/-/g, '');
}

// ===== Salami hang label (print to Phomemo via image hand-off) =====
// ── Salami hang label — pure canvas, identical in browser and node ──────────
// d = { flavour, batchCode, processCode, hung, ready }  (hung/ready = ISO date strings)
// orientation = 'landscape' (30×20) or 'portrait' (20×30)

function labelDate(iso){
  if(!iso) return '';
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var p=String(iso).slice(0,10).split('-');
  if(p.length<3) return iso;
  return parseInt(p[2],10)+' '+M[parseInt(p[1],10)-1]+' '+p[0].slice(2);
}

// fit text into maxWidth, wrapping on spaces, shrinking font from hi→lo
function fitLines(ctx, text, maxWidth, hi, lo, weight, family, maxLines){
  text = (text||'').trim();
  for(var fs=hi; fs>=lo; fs--){
    ctx.font = weight+' '+fs+'px '+family;
    var words=text.split(/\s+/), lines=[], cur='';
    for(var i=0;i<words.length;i++){
      var t=cur?cur+' '+words[i]:words[i];
      if(ctx.measureText(t).width<=maxWidth || !cur){ cur=t; }
      else { lines.push(cur); cur=words[i]; }
    }
    if(cur) lines.push(cur);
    var ok=lines.length<=maxLines && lines.every(function(l){return ctx.measureText(l).width<=maxWidth;});
    if(ok) return {lines:lines, fs:fs};
  }
  ctx.font = weight+' '+lo+'px '+family;
  return {lines:[text], fs:lo};
}

function drawSalamiLabel(ctx, W, H, d, orientation){
  var FAM = 'Arial, Helvetica, sans-serif';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#000';
  ctx.textBaseline='alphabetic';
  var pad = Math.round(W*0.05);
  var iw = W - pad*2;

  if(orientation==='portrait'){
    // 20 (W) × 30 (H): stacked, left aligned
    var y = pad + Math.round(H*0.02);
    var fl = fitLines(ctx, d.flavour, iw, Math.round(H*0.11), Math.round(H*0.055), 'bold', FAM, 3);
    ctx.textAlign='center';
    for(var i=0;i<fl.lines.length;i++){ y+=fl.fs; ctx.font='bold '+fl.fs+'px '+FAM; ctx.fillText(fl.lines[i], W/2, y); y+=Math.round(fl.fs*0.12); }
    var subP=[]; if(d.species)subP.push(d.species); if(d.alias)subP.push(d.alias);
    if(subP.length){ var alP=fitLines(ctx, subP.join('  \u00b7  '), iw, Math.round(H*0.056), Math.round(H*0.036), 'normal', FAM, 1); y+=Math.round(H*0.012)+alP.fs; ctx.font=alP.fs+'px '+FAM; ctx.fillText(alP.lines[0], W/2, y); }
    y += Math.round(H*0.02);
    ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(2,Math.round(H*0.006));
    ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-pad,y); ctx.stroke();
    y += Math.round(H*0.035);
    ctx.textAlign='left';
    var rows=[['BATCH', d.batchCode||'—'],['RUN', d.processCode||'—'],['HUNG', labelDate(d.hung)],['READY', labelDate(d.ready)]];
    var lblFs=Math.round(H*0.034), valFs=Math.round(H*0.055);
    for(var r=0;r<rows.length;r++){
      if(!rows[r][1]) continue;
      ctx.font=lblFs+'px '+FAM; ctx.fillStyle='#000'; ctx.fillText(rows[r][0], pad, y+lblFs);
      ctx.font='bold '+valFs+'px '+FAM; ctx.fillText(rows[r][1], pad, y+lblFs+Math.round(valFs*0.95));
      y += lblFs + valFs + Math.round(H*0.022);
    }
  } else {
    // 30 (W) × 20 (H) landscape: flavour, species·alias, codes, dates — centred, sized to fit H
    var cy = Math.round(H*0.06);
    ctx.textAlign='center';
    var f2 = fitLines(ctx, d.flavour, iw, Math.round(H*0.19), Math.round(H*0.10), 'bold', FAM, 2);
    for(var j=0;j<f2.lines.length;j++){ cy+=f2.fs; ctx.font='bold '+f2.fs+'px '+FAM; ctx.fillText(f2.lines[j], W/2, cy); cy+=Math.round(f2.fs*0.08); }
    var subL=[]; if(d.species)subL.push(d.species); if(d.alias)subL.push(d.alias);
    if(subL.length){ var alL=fitLines(ctx, subL.join('  \u00b7  '), iw, Math.round(H*0.10), Math.round(H*0.065), 'normal', FAM, 1); cy+=Math.round(H*0.01)+alL.fs; ctx.font=alL.fs+'px '+FAM; ctx.fillText(alL.lines[0], W/2, cy); }
    cy += Math.round(H*0.035);
    ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(2,Math.round(H*0.01));
    ctx.beginPath(); ctx.moveTo(pad,cy); ctx.lineTo(W-pad,cy); ctx.stroke();
    cy += Math.round(H*0.04);
    var codes=(d.batchCode||'')+'   \u00b7   '+(d.processCode||'');
    var cf=fitLines(ctx, codes, iw, Math.round(H*0.12), Math.round(H*0.075), 'bold', FAM, 1);
    cy+=cf.fs; ctx.font='bold '+cf.fs+'px '+FAM; ctx.fillText(cf.lines[0], W/2, cy);
    cy+=Math.round(H*0.035);
    var dates=[]; if(d.hung)dates.push('Hung '+labelDate(d.hung)); if(d.ready)dates.push('Ready '+labelDate(d.ready));
    var dstr=dates.join('    ');
    if(dstr){ var df=fitLines(ctx, dstr, iw, Math.round(H*0.095), Math.round(H*0.058), 'normal', FAM, 1); cy+=df.fs; ctx.font='normal '+df.fs+'px '+FAM; ctx.fillText(dstr, W/2, cy); }
  }
}

function salamiLabelData(prodForm, stage){
  var ch=(prodForm.children||[]).find(function(c){return c.letter===stage.childLetter;});

    processCode: prodForm.processCode || processCodeFromDate(prodForm.startDate||today()),

function renderLabelCanvas(d, orientation, scale){

function customerEstateName(prodForm){
  var nm=(typeof getRunEstateName==='function' ? getRunEstateName(prodForm) : '') || '';

}
var CUST_ALLERGENS=['mustard','celery','milk','egg','eggs','fish','soya','soy','sesame','peanut','peanuts','nut','nuts','almond','hazelnut','walnut','cashew','gluten','wheat','barley','rye','oats','sulphite','sulphites','sulphur','lupin','crustacean','mollusc'];
var CUST_EXCLUDE=['paprika','sugar','dextrose','enzyme','flora','culture','starter','alcohol','wine','wash'];
function _custExcluded(name){ var n=(name||'').trim().toLowerCase(); if(!n) return true; return CUST_EXCLUDE.indexOf(n.split(/\s+/)[0])>=0; }
function _isAllergenWord(w){ return CUST_ALLERGENS.indexOf((w||'').toLowerCase().replace(/[^a-z]/g,''))>=0; }
function customerLabelData(prodForm, stage){
  var ch=(prodForm.children||[]).find(function(c){return c.letter===stage.childLetter;}) || (prodForm.children||[])[0] || {};
  var flav=(ch.recipe&&ch.recipe.name)?ch.recipe.name:(ch.code?('Child '+ch.code):'Salami');

  var sp=(ch.species||prodForm.speciesName||''); if(sp) sp=sp.charAt(0).toUpperCase()+sp.slice(1);
  var meat=+ch.meatKg||0, fat=+ch.fatKg||0, tot=meat+fat;
  var lines=(ch.recipe&&ch.recipe.lines)?ch.recipe.lines.slice():[];
  var sps=lines.filter(function(l){return !_custExcluded(l.name);})
    .map(function(l){return {amt:(+l.amount||0), name:l.name};})
    .sort(function(a,b){return b.amt-a.amt;}).map(function(x){return x.name;});
  var ingr=[];
  if(tot>0){ ingr.push(sp+' meat '+Math.round(meat/tot*100)+'%'); ingr.push('Organic pork fat '+Math.round(fat/tot*100)+'%'); }
  ingr=ingr.concat(sps);
  return { title:(sp+' '+flav).trim(), sub:customerEstateName(prodForm), ingredients:ingr, batchCode:prodForm.batchCode||'' };
}
function drawCustomerLabel(ctx,W,H,d){

  function fitW(text, weight, fam, cap){ var fz=cap; for(; fz>=8; fz--){ ctx.font=weight+' '+fz+'px '+fam; if(ctx.measureText(text).width<=iw) break; } return fz; }
  var WM='ARTISAN BY ROBERT';

  for(; tf>=Math.round(H*0.10); tf--){ ctx.font='600 '+tf+'px '+DISP; var ws=(d.title||'').split(' '),ln=[],cur=''; for(var i=0;i<ws.length;i++){var t=cur?cur+' '+ws[i]:ws[i]; if(ctx.measureText(t).width<=iw||!cur)cur=t; else{ln.push(cur);cur=ws[i];}} if(cur)ln.push(cur); if(ln.length<=2&&ln.every(function(l){return ctx.measureText(l).width<=iw;})){titleLines=ln;break;} }
  // ingredients tokens + layout

function getSpeciesForBatch(batchCode) {
  const intake = intakes.find(function(i){ return i.batchCode === batchCode; });

  return sp === 'Other' ? (intake.items[0].custom || 'Other') : sp;
}

function getFatPercentForSpecies(speciesName) {

// ── VENISON BREAKDOWN ─────────────────────────────────────────────────────────
// A venison run = one whole-carcass intake split into product lanes (children).
// Lanes are configurable per intake; pastrami diverts the shoulders out of salami.
const VEN_LANE_TYPES = [
  {key:'prosciutto', name:'Venison prosciutto',            calc:'cure60',  salt:true},
  {key:'curedloin',  name:'Cured venison loins & fillet',  calc:'cure60',  salt:true},
  {key:'salami',     name:'Venison salami',                calc:'salami',  salt:false},
  {key:'pastrami',   name:'Venison pastrami',              calc:'pastrami',salt:true}
];
const VEN_SALE_PER_KG = 75;       // £/kg dry
const VEN_SALT_PCT = 2.5;         // % of into-cure weight
function venSumMeat(lane){ return (lane.components||[]).reduce(function(a,c){ return a + (Number(c.meat)||0); }, 0); }
function venLaneFinishedG(lane){
  if (lane.calc === 'cure60')  return venSumMeat(lane) * 0.60;
  if (lane.calc === 'salami')  { var base = Number(lane.minceYield) || venSumMeat(lane); return base * 1.25 * 0.60; }
  if (lane.calc === 'pastrami'){ var y = (Number(lane.yieldPct) || 60) / 100; return venSumMeat(lane) * y; }
  return 0;
}
function venLaneValue(lane){ return venLaneFinishedG(lane) / 1000 * VEN_SALE_PER_KG; }
function venRunFinishedG(run){ return (run.lanes||[]).reduce(function(a,l){ return a + venLaneFinishedG(l); }, 0); }
function venCompLossPct(c){ var m=Number(c.meat)||0, b=Number(c.bone)||0; return (m+b)>0 ? b/(m+b)*100 : 0; }
function venCompSalt(c){ return (Number(c.meat)||0) * VEN_SALT_PCT/100; }

function newVenRun(){ return {id:'venr_'+Date.now(), batchCode:'', estate:'', date:today(), note:'', lanes:[]}; }
function venSortLanes(run){
  var order = VEN_LANE_TYPES.map(function(t){return t.key;});
  run.lanes.sort(function(a,b){ return order.indexOf(a.key) - order.indexOf(b.key); });
}
function venToggleLane(run, type, on){
  if (on) {
    if (run.lanes.find(function(l){return l.key===type;})) return;
    var def = VEN_LANE_TYPES.find(function(t){return t.key===type;});
    var lane = {key:type, name:def.name, calc:def.calc, salt:def.salt, components:[], frozen:false, frozenDate:'', resumeDate:'', cureDate:''};
    if (type==='salami') lane.minceYield = '';
    if (type==='pastrami') lane.yieldPct = 60;
    run.lanes.push(lane);
    if (type==='pastrami') {  // shoulders divert from salami → pastrami
      var sal = run.lanes.find(function(l){return l.key==='salami';});
      if (sal) {
        var sh = sal.components.filter(function(c){return /shoulder/i.test(c.name||'');});
        sal.components = sal.components.filter(function(c){return !/shoulder/i.test(c.name||'');});
        lane.components = lane.components.concat(sh);
      }
    }
  } else {
    if (type==='pastrami') {  // shoulders move back to salami
      var pas = run.lanes.find(function(l){return l.key==='pastrami';});
      var sal2 = run.lanes.find(function(l){return l.key==='salami';});
      if (pas && sal2) { sal2.components = sal2.components.concat(pas.components.filter(function(c){return /shoulder/i.test(c.name||'');})); }
    }
    run.lanes = run.lanes.filter(function(l){return l.key!==type;});
  }
  venSortLanes(run);
}

var prodHangingExpanded = false;
const ESTATE_ALIAS = {'coombe manor':'Jem','belvoir castle':'Caroline','lees court':'Elizabeth','hoddington':'Sam','audley end':'Aimee','cold aston':'Gary','st clair':'Alex'};
const STEP_NAME = {1:'recipe',2:'blend',3:'mince',4:'stuff & hang'};
function _titleCase(x){ return (x||'').replace(/\b\w/g, function(c){ return c.toUpperCase(); }); }
function getRunEstateName(r){
  if (r.estate) return r.estate;
  var ins = intakes.find(function(i){ return i.batchCode === r.batchCode; });
  if (!ins) return '';
  var nm = getName(estates, ins.estateId);
  return (nm && nm !== '\u2014' && nm !== '-') ? nm : '';
}
function getRunAlias(r){
  var name = (getRunEstateName(r) || '').trim();
  if (!name) return '';
  var low = name.toLowerCase();
  if (low.indexOf(' - ') >= 0) return _titleCase(name.split(' - ').pop().trim());
  for (var k in ESTATE_ALIAS){ if (low.indexOf(k) >= 0) return ESTATE_ALIAS[k]; }
  return _titleCase(name);
}
function runStage(r){
  var kids = r.children || [];
  if (r.status === 'finished') return 'ready';
  if (kids.length && kids.every(function(c){ return c.vacPacked; })) return 'ready';
  if (kids.length && kids.every(function(c){ return c.stuffed; })) return 'hanging';
  return 'active';
}
function runActiveStep(r){
  var kids = r.children || [];
  if (!kids.length) return 1;
  return Math.min.apply(null, kids.map(function(c){ return childProgress(c).step; }));
}
function runReadyDate(r){
  var ds = (r.children||[]).map(function(c){ return c.stuffFinish; }).filter(Boolean).sort();
  return ds.length ? ds[ds.length-1] : null;
}
function weeksLeft(iso){
  if (!iso) return null;
  var d = new Date(iso), n = new Date(today());
  var ms = d - n; if (isNaN(ms)) return null;
  return Math.max(0, Math.ceil(ms/(7*86400000)));
}

// ── Recipe line classification (shared by overview + make screen) ──────────
// Salt is already in at mince; alcohol/wine is the blending medium, not a
// counted ingredient. "Actionable" = the dry spices you tick into the bowl.
function recipeLineIsSalt(l){ return (l && l.name ? l.name.toString().toLowerCase() : '').indexOf('salt') >= 0; }
function recipeLineIsMedium(l){ var n = (l && l.name ? l.name.toString().toLowerCase() : ''); return (n.indexOf('alcohol') >= 0 || n.indexOf('wine') >= 0 || n.indexOf('wash') >= 0) && !recipeLineIsSalt(l); }
function recipeLineIsBlank(l){ return !(l && l.name != null && l.name.toString().trim()); }
function recipeActionableLines(lines){ return (lines || []).filter(function(l){ return !recipeLineIsBlank(l) && !recipeLineIsSalt(l) && !recipeLineIsMedium(l); }); }

// ── Make mode: big-button butchery checklist for one child ─────────────────
// Tick each ingredient as it goes in; untick to undo. Each tick stamps its date
// (so a 2-day mix shows when each item went in). State saved on the child.
function renderMakeMode() {
  const v = document.getElementById('view-prod');
  v.innerHTML = '';
  const child = (prodForm.children || []).find(function(c){ return c.letter === makeChildLetter; });
  if (!child || !child.recipe || !child.recipe.lines) { makeChildLetter = null; renderProductionForm(); return; }

  function lc(s){ return (s == null ? '' : s.toString()).toLowerCase(); }
  function isSalt(l){ return lc(l.name).indexOf('salt') >= 0; }
  function isMedium(l){ var n = lc(l.name); return (n.indexOf('alcohol') >= 0 || n.indexOf('wine') >= 0 || n.indexOf('wash') >= 0) && !isSalt(l); }
  function isGarlic(l){ return lc(l.name).indexOf('garlic') >= 0; }
  function isSugar(l){ var n = lc(l.name); return n.indexOf('sugar') >= 0 || n.indexOf('dextrose') >= 0; }
  function isEnzyme(l){ var n = lc(l.name); return n.indexOf('enzyme') >= 0 || n.indexOf('flora') >= 0 || n.indexOf('culture') >= 0 || n.indexOf('starter') >= 0; }
  function mediumName(l){ var n = lc(l.name); if (n.indexOf('alcohol') >= 0 || n.indexOf('wash') >= 0) return 'alcohol >13%'; if (n.indexOf('wine') >= 0) return 'wine'; return l.name; }
  function amtStr(line){ return (line.type === 'asneeded' || line.amount == null || line.amount === '') ? 'as needed' : (line.amount + ' ' + (line.unit || 'g')); }

  const lines = (child.recipe.lines || []).filter(function(l){ return !recipeLineIsBlank(l); });
  const saltLines = lines.filter(isSalt);
  const mediumLines = lines.filter(isMedium);
  const rest = lines.filter(function(l){ return !isSalt(l) && !isMedium(l); });
  const sugars = rest.filter(isSugar);
  const enz = rest.filter(function(l){ return isEnzyme(l) && !isSugar(l); });
  const gar = rest.filter(function(l){ return isGarlic(l) && !isSugar(l) && !isEnzyme(l); });
  const others = rest.filter(function(l){ return !isSugar(l) && !isEnzyme(l) && !isGarlic(l); });
  const tickable = sugars.concat(enz).concat(gar).concat(others);
  const mediumLabel = mediumLines.length ? mediumName(mediumLines[0]) : 'alcohol >13%';

  // Salt + alcohol/wine are not tickable here (salt is in at mince; alcohol is the blending medium).
  // Auto-mark them as in, so overview counts + any allDone checks elsewhere stay consistent.
  var changed = false;
  saltLines.concat(mediumLines).forEach(function(l){ if (!l.addedDate) { l.addedDate = today(); changed = true; } });
  if (changed) saveData();

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:20px;font-weight:700;margin:0;'}, 'Make: Child ' + child.code));
  const back = btn('', '← Back', function(){ makeChildLetter = null; renderProductionForm(); });
  back.style.cssText = 'background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 14px;cursor:pointer;';
  hdr.appendChild(back);
  v.appendChild(hdr);

  const sub = div(''); sub.style.cssText = 'margin:4px 0 16px;';
  sub.appendChild(el('p', {style:'font-size:16px;font-weight:600;color:#27500a;margin:0;'}, (child.recipe.name || 'Recipe') + ' · ' + child.totalKg + 'kg mix'));
  const done = tickable.filter(function(l){ return l.addedDate; }).length;
  sub.appendChild(el('p', {style:'font-size:14px;color:#666;margin:2px 0 0;'}, done + ' of ' + tickable.length + ' done · tap each as it goes in'));
  v.appendChild(sub);

  const list = div(''); list.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  // Salt context row(s) — already in at mince, not tickable
  saltLines.forEach(function(line){
    const row = div(''); row.style.cssText = 'display:flex;align-items:center;gap:14px;width:100%;border-radius:12px;padding:16px 18px;background:#f3f4f2;border:2px solid #ececec;';

    const nw = div(''); nw.style.cssText = 'flex:1;';
    nw.appendChild(el('span', {style:'font-weight:600;color:#7a8a72;'}, line.name));

    row.appendChild(nw);
    row.appendChild(el('span', {style:'font-size:16px;font-weight:600;color:#999;flex-shrink:0;'}, amtStr(line)));
    list.appendChild(row);
  });

  // Tickable items, in order: sugar -> enzyme -> garlic(blitz into alcohol) -> the rest
  tickable.forEach(function(line){
    const isAdded = !!line.addedDate;
    const garlic = isGarlic(line);
    const b = el('button', {});
    b.style.cssText = 'display:flex;align-items:center;gap:14px;width:100%;text-align:left;border-radius:12px;padding:18px;font-size:18px;cursor:pointer;border:2px solid ' +
      (isAdded ? '#27500a' : (garlic ? '#cdd9e8' : '#d0e8c8')) + ';background:' + (isAdded ? '#eaf3e4' : (garlic ? '#eef3f9' : '#fff')) + ';';
    const tick = el('span', {style:'font-size:26px;width:32px;flex-shrink:0;color:' + (isAdded ? '#27500a' : '#bbb') + ';'}, isAdded ? '☑' : '☐');
    const nameWrap = div(''); nameWrap.style.cssText = 'flex:1;';
    var displayName = garlic ? ('Blitz ' + line.name + ' into ' + mediumLabel) : line.name;
    nameWrap.appendChild(el('span', {style:'font-weight:600;' + (isAdded ? 'text-decoration:line-through;color:#7a8a72;' : (garlic ? 'color:#2c4a73;' : ''))}, displayName));
    if (garlic && !isAdded) nameWrap.appendChild(el('span', {style:'display:block;font-size:12px;color:#3a5a86;margin-top:2px;'}, 'blitz into ' + mediumLabel + ' first'));
    if (isAdded) nameWrap.appendChild(el('span', {style:'display:block;font-size:12px;color:#888;margin-top:2px;'}, 'added ' + line.addedDate));
    const amt = el('span', {style:'font-size:18px;font-weight:700;color:' + (isAdded ? '#7a8a72' : '#1a1a1a') + ';flex-shrink:0;'}, amtStr(line));
    b.appendChild(tick); b.appendChild(nameWrap); b.appendChild(amt);
    b.addEventListener('click', function(){
      if (line.addedDate) { delete line.addedDate; }

      renderMakeMode();

    list.appendChild(b);
  });
  v.appendChild(list);

  // Method / next-step note
  if (mediumLines.length && gar.length === 0) {
    const m = div(''); m.style.cssText = 'margin-top:12px;background:#eef3f9;border:1px solid #cdd9e8;border-radius:12px;padding:14px 16px;color:#2c4a73;font-size:14px;line-height:1.5;';
    m.appendChild(el('span', {}, 'Method: blend the dry spices in ' + mediumLabel + ', then mix into the meat.'));
    v.appendChild(m);
  } else {
    const m = div(''); m.style.cssText = 'margin-top:12px;background:#f7f8f6;border:1px solid #e6e9e3;border-radius:12px;padding:14px 16px;color:#555;font-size:14px;line-height:1.5;';
    m.appendChild(el('span', {}, 'Then mix the whole blend into the meat.'));
    v.appendChild(m);
  }

  // All-done banner (soft tint, no solid fill)
  const allDone = tickable.length > 0 && tickable.every(function(l){ return l.addedDate; });
  if (allDone) {
    const banner = div(''); banner.style.cssText = 'margin-top:16px;background:#eaf3e4;color:#27500a;border:1px solid #27500a;border-radius:12px;padding:16px;text-align:center;font-size:17px;font-weight:600;';
    banner.appendChild(el('span', {}, '✓ All ingredients added to Child ' + child.code));
    v.appendChild(banner);
    const fwd = el('button', {style:'margin-top:12px;width:100%;background:#27500a;color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;'}, '③ Mix into meat →');
    fwd.addEventListener('click', function(){ makeChildLetter = null; prodStageEdit = {type:'mix', date:today(), notes:'', childLetter:child.letter}; renderProductionForm(); });
    v.appendChild(fwd);
  }
}

function childProgress(c){
  var hasRecipe = !!(c.recipe && c.recipe.lines && c.recipe.lines.length);
  var act = hasRecipe ? recipeActionableLines(c.recipe.lines) : [];
  var ticked = act.filter(function(l){ return l.addedDate; }).length;
  var blendMade = hasRecipe && (act.length===0 ? true : ticked===act.length);
  var minced = !!c.minced;
  var mixed = !!c.mixed;
  var stuffed = !!c.stuffed;
  var vacPacked = !!c.vacPacked;
  var step = vacPacked ? 6 : (stuffed ? 5 : (mixed ? 4 : (blendMade ? 3 : (hasRecipe ? 2 : 1))));
  return {hasRecipe:hasRecipe, blendMade:blendMade, minced:minced, stuffed:stuffed, vacPacked:vacPacked, step:step, ticked:ticked, total:act.length};
}

function stageMeta(s){
  const icon = {defrost:'\u2744\ufe0f', fatcalc:'\ud83e\uddee', recipe:'\ud83d\udccb', mince:'\ud83d\udd2a', mix:'\ud83e\udd63', stuff_hang:'\ud83c\udf2d'}[s.type] || '\u2022';
  const typeName = {defrost:'Defrost', fatcalc:'Fat calculator', recipe:'Recipe', mince:'Prep, wash & mince', mix:'Mix into meat', stuff_hang:'Stuffing & hanging'}[s.type] || s.type;
  let summary = '';
  if (s.type === 'defrost') summary = (s.meatKg ? s.meatKg + 'kg meat out' : '');
  else if (s.type === 'fatcalc') summary = (s.totalKg ? s.meatKg + 'kg meat + ' + s.fatKg + 'kg fat = ' + s.totalKg + 'kg (' + s.fatPercent + '%)' : '');
  else if (s.type === 'recipe') summary = (s.recipeName ? s.recipeName + (s.childLetter ? ' \u2192 ' + (prodForm.batchCode||'') + s.childLetter : '') : '');
  else if (s.type === 'mince') { const cw = s.childWork || {}; const n = Object.keys(cw).length; const mixed = Object.keys(cw).filter(function(k){return cw[k].mixed;}).length; summary = n ? (mixed + ' of ' + n + ' children mixed') : 'mince day'; }
  else if (s.type === 'mix') { var _mx = (prodForm.children||[]).find(function(c){return c.letter===s.childLetter;}); var _mn = _mx && _mx.recipe && _mx.recipe.name ? _mx.recipe.name : ('Child ' + (prodForm.batchCode||'') + (s.childLetter||'')); summary = _mn + (s.mixDone ? ' \u00b7 blend mixed in' : ' \u00b7 not yet mixed'); }
  else if (s.type === 'stuff_hang') { var parts = []; if (s.childLetter) { var sc = (prodForm.children||[]).find(function(c){return c.letter===s.childLetter;}); parts.push(sc && sc.recipe && sc.recipe.name ? sc.recipe.name : ('Child ' + (prodForm.batchCode||'') + s.childLetter)); } if (s.count) parts.push(s.count + (s.unitGrams ? ' \u00d7 ' + s.unitGrams + 'g' : ' salami')); if (s.skinSize) parts.push(s.skinSize); if (s.finishDate) parts.push('ready ' + fmtDate(s.finishDate)); summary = parts.join(' \u00b7 '); }
  return {icon:icon, typeName:typeName, summary:summary};
}

    card.appendChild(meatField);
  } else if (t === 'fatcalc') {
    // Fat calculator stage. Fat is added as a % of the meat (10kg + 20% = 2kg fat = 12kg total).
    const known = getFatPercentForSpecies(prodForm.speciesName);
    if (prodStageEdit.fatPercent == null) prodStageEdit.fatPercent = (prodForm.fatPercent != null ? prodForm.fatPercent : (known != null ? known : 25));
    // pre-fill meat from latest defrost if not already set

      const defs = (prodForm.stages || []).filter(function(s){ return s.type === 'defrost' && s.meatKg > 0; }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
      prodStageEdit.meatKg = defs.length ? defs[0].meatKg : 0;
    }
    card.appendChild(p('muted', 'Fat is added as a % of the meat. Example: 10kg meat + 20% = 2kg fat = 12kg total.'));
    if (prodStageEdit.childCount == null) prodStageEdit.childCount = 1;

    const meatField = div('field'); meatField.style.marginTop = '12px';
    meatField.appendChild(label('Meat weight (kg)'));
    const meatInp = input({type:'number', min:'0', step:'0.1', value: prodStageEdit.meatKg || ''});
    meatInp.placeholder = 'e.g. 20';
    meatInp.style.cssText = 'width:140px;';
    card.appendChild(meatField); meatField.appendChild(meatInp);

    const pctField = div('field'); pctField.style.marginTop = '12px';
    pctField.appendChild(label('Fat to add (% of the meat)' + (prodForm.speciesName ? ' — ' + prodForm.speciesName : '')));
    const pctInp = input({type:'number', min:'1', max:'60', step:'1', value: prodStageEdit.fatPercent});
    pctInp.style.cssText = 'width:140px;';
    card.appendChild(pctField); pctField.appendChild(pctInp);

    const childField = div('field'); childField.style.marginTop = '12px';
    childField.appendChild(label('Divide into how many children? (each its own flavour)'));
    const childInp = input({type:'number', min:'1', max:'12', step:'1', value: prodStageEdit.childCount});
    childInp.style.cssText = 'width:140px;';
    card.appendChild(childField); childField.appendChild(childInp);
    childField.appendChild(p('muted', 'The mixer works best at 20kg or under per child. They become Child ' + (prodForm.batchCode||'') + 'A, B, C…'));

    const resultHolder = div(''); resultHolder.style.marginTop = '14px';
    card.appendChild(resultHolder);

    function recomputeFat() {
      const m = parseFloat(meatInp.value) || 0;
      const pct = parseFloat(pctInp.value);
      let n = parseInt(childInp.value) || 1; if (n < 1) n = 1;
      prodStageEdit.meatKg = m;
      prodStageEdit.fatPercent = isNaN(pct) ? null : pct;
      prodStageEdit.childCount = n;
      resultHolder.innerHTML = '';
      if (!m || m <= 0 || isNaN(pct) || pct <= 0) {
        prodStageEdit.fatKg = 0; prodStageEdit.totalKg = 0;
        resultHolder.appendChild(p('muted', 'Enter a meat weight and fat % to see the result.'));
        return;
      }
      const fat = Math.round(m * (pct/100) * 100) / 100;
      const total = Math.round((m + fat) * 100) / 100;
      prodStageEdit.fatKg = fat; prodStageEdit.totalKg = total;
      const leanCompPct = total > 0 ? Math.round((m/total)*1000)/10 : 100;
      const fatCompPct = total > 0 ? Math.round((fat/total)*1000)/10 : 0;
      const cc = div('');
      cc.style.cssText = 'background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:14px 16px;';
      cc.appendChild(el('p', {style:'font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px;'}, 'Whole run · add ' + pct + '% fat to the meat'));
      const grid = div(''); grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;';
      [['Meat (lean)', m + ' kg'], ['Add fat', fat + ' kg'], ['Total mix', total + ' kg']].forEach(function(pair){
        const b = div(''); b.style.cssText = 'background:#fff;border-radius:6px;padding:8px 10px;text-align:center;';
        b.appendChild(el('p', {style:'font-size:10px;color:#888;margin:0 0 2px;'}, pair[0]));
        b.appendChild(el('p', {style:'font-size:14px;font-weight:600;margin:0;color:#1a1a1a;'}, pair[1]));
        grid.appendChild(b);
      });
      cc.appendChild(grid);
      cc.appendChild(el('p', {style:'font-size:11px;color:#888;margin:0 0 4px;'}, 'Finished mix (lean vs fat)'));
      const bar = document.createElement('div'); bar.style.cssText = 'display:flex;width:100%;height:36px;border-radius:6px;overflow:hidden;';
      const ls = document.createElement('div'); ls.style.cssText = 'background:#A32D2D;display:flex;align-items:center;justify-content:center;width:' + leanCompPct + '%;';
      ls.innerHTML = '<span style="color:#FCEBEB;font-size:12px;font-weight:500;white-space:nowrap;padding:0 6px;">Lean ' + m + 'kg</span>';
      const fs2 = document.createElement('div'); fs2.style.cssText = 'background:#FAC775;display:flex;align-items:center;justify-content:center;width:' + fatCompPct + '%;';
      fs2.innerHTML = '<span style="color:#412402;font-size:12px;font-weight:500;white-space:nowrap;padding:0 6px;">Fat ' + fat + 'kg</span>';
      bar.appendChild(ls); bar.appendChild(fs2); cc.appendChild(bar);
      resultHolder.appendChild(cc);

      // Per-child breakdown
      if (n > 1) {
        const childMeat = Math.round((m / n) * 100) / 100;
        const childFat = Math.round((fat / n) * 100) / 100;
        const childTotal = Math.round((total / n) * 100) / 100;
        const kids = div(''); kids.style.cssText = 'background:#fff;border:1px solid #d0e8c8;border-radius:8px;padding:14px 16px;margin-top:10px;';
        kids.appendChild(el('p', {style:'font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px;'}, 'Each of the ' + n + ' children'));
        const krow = div(''); krow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;';
        [['Meat each', childMeat + ' kg'], ['Fat each', childFat + ' kg'], ['Total each', childTotal + ' kg']].forEach(function(pair){
          const b = div(''); b.style.cssText = 'background:#f9fdf8;border-radius:6px;padding:8px 10px;text-align:center;';
          b.appendChild(el('p', {style:'font-size:10px;color:#888;margin:0 0 2px;'}, pair[0]));
          b.appendChild(el('p', {style:'font-size:14px;font-weight:600;margin:0;color:#27500a;'}, pair[1]));
          krow.appendChild(b);
        });
        kids.appendChild(krow);
        const _off = childLetterOffset(prodForm.batchCode, prodEditId);
        const letters = []; for (let i=0;i<n;i++) letters.push((prodForm.batchCode||'') + String.fromCharCode(65+_off+i));
        kids.appendChild(el('p', {style:'font-size:12px;color:#444;margin:10px 0 0;'}, 'Children: ' + letters.map(function(c){return 'Child ' + c;}).join(', ')));
        resultHolder.appendChild(kids);
      }
    }
    meatInp.addEventListener('input', recomputeFat);
    pctInp.addEventListener('input', recomputeFat);
    childInp.addEventListener('input', recomputeFat);
    recomputeFat();
  } else if (t === 'recipe') {
    // Recipe stage. Pick a child, load from library or build fresh; lines scale to the
    // child's total mix (meat+fat). Every gram is editable. Salt is line 1.
    const children = prodForm.children || [];
    if (children.length === 0) {
      const warn = div('');
      warn.style.cssText = 'background:#faeeda;border:1px solid #f0d4a8;border-radius:8px;padding:12px 14px;margin-top:12px;';
      warn.appendChild(p('', 'No children yet. Do the Fat calculator first and set how many children this run divides into — then build a recipe for each child.'));
      card.appendChild(warn);
    } else {
      if (prodStageEdit.childLetter == null) prodStageEdit.childLetter = children[0].letter;
      if (prodStageEdit.lines == null) prodStageEdit.lines = STANDARD_RECIPE_LINES.map(function(l){ return Object.assign({}, l); });

      // Child picker
      const cf = div('field'); cf.style.marginTop = '12px';
      cf.appendChild(label('Which child is this recipe for?'));
      const cSel = select(children.map(function(c){ return [c.letter, 'Child ' + c.code + ' (' + c.totalKg + 'kg)']; }), prodStageEdit.childLetter, function(val){
        prodStageEdit.childLetter = val;
        // if that child already has a saved recipe, load its lines
        const ch = children.find(function(c){ return c.letter === val; });
        if (ch && ch.recipe && ch.recipe.lines) { prodStageEdit.lines = ch.recipe.lines.map(function(l){ return Object.assign({}, l); }); prodStageEdit.recipeName = ch.recipe.name; }
        renderStageForm();
      });
      cSel.style.cssText = 'width:100%;margin-top:4px;';
      cf.appendChild(cSel); card.appendChild(cf);

      // Library loader
      const lf = div('field'); lf.style.marginTop = '12px';
      lf.appendChild(label('Load a recipe from the library (or build fresh below)'));
      const libOpts = [['','— build fresh —']].concat(recipeLibrary.map(function(r){ return [r.id, r.name]; }));
      const lSel = select(libOpts, '', function(val){
        if (!val) return;
        const r = recipeLibrary.find(function(x){ return x.id === val; });
        if (r) { prodStageEdit.lines = r.ingredients.map(function(l){ return Object.assign({}, l); }); prodStageEdit.recipeName = r.name; renderStageForm(); }
      });
      lSel.style.cssText = 'width:100%;margin-top:4px;';
      lf.appendChild(lSel); card.appendChild(lf);

      // Recipe name
      const nf = div('field'); nf.style.marginTop = '12px';
      nf.appendChild(label('Recipe name'));
      const nInp = input({type:'text', value: prodStageEdit.recipeName || ''});
      nInp.placeholder = 'e.g. Garlic & Black Pepper';
      nInp.style.cssText = 'width:100%;';
      nInp.addEventListener('input', function(e){ prodStageEdit.recipeName = e.target.value; });
      nf.appendChild(nInp); card.appendChild(nf);

      const child = children.find(function(c){ return c.letter === prodStageEdit.childLetter; }) || children[0];
      const childTotal = child.totalKg || 0;

      // Ingredient table — suggested grams (editable)
      card.appendChild(el('p', {style:'font-size:13px;font-weight:600;color:#27500a;margin:14px 0 6px;'}, 'Ingredients for Child ' + child.code + ' (' + childTotal + 'kg mix)'));
      card.appendChild(p('muted', 'Spices scale to the batch weight. Salt is a % of the mix; sugar and the enzyme stay fixed (they seed and feed the culture). Type over any amount to adjust.'));
      const tbl = div(''); tbl.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-top:8px;';

      function suggestG(line) {
        if (line.type === 'pct') return Math.round(childTotal * 1000 * (line.value/100));
        if (line.type === 'perkg') return Math.round(childTotal * line.value);
        if (line.type === 'ratio') return Math.round(childTotal * 1000 * line.value);
        if (line.type === 'fixed') return line.value;
        return null; // asneeded
      }

      function setLineFromGrams(line, grams) {
        line.amount = grams;
        if (grams == null || isNaN(grams)) return;
        if (line.type === 'fixed') { line.value = grams; return; }
        if (childTotal <= 0) return;
        if (line.type === 'pct') line.value = grams / (childTotal * 10);
        else if (line.type === 'perkg') line.value = grams / childTotal;
        else if (line.type === 'ratio') { line.value = grams / (childTotal * 1000); line.refAmt = grams; line.refMix = Math.round(childTotal * 1000); }
      }

      // 100 g powder quality guide: a single FLAVOUR/dry powder over ~100 g per
      // 12.5 kg meat tends to make the salami crumbly. Salt, sugar, enzyme,
      // garlic (fresh) and the alcohol medium are exempt. Design-time hint only.
      function powderIsFlavour(l){
        var n = (l && l.name ? l.name.toString().toLowerCase() : '');
        if (!n) return false;
        if (n.indexOf('salt') >= 0 || n.indexOf('sugar') >= 0 || n.indexOf('dextrose') >= 0) return false;
        if (n.indexOf('enzyme') >= 0 || n.indexOf('flora') >= 0 || n.indexOf('culture') >= 0 || n.indexOf('starter') >= 0) return false;
        if (n.indexOf('alcohol') >= 0 || n.indexOf('wine') >= 0 || n.indexOf('wash') >= 0) return false;
        if (n.indexOf('garlic') >= 0) return false;
        return l.type !== 'asneeded';
      }
      var _meatRef = (child.meatKg && child.meatKg > 0) ? child.meatKg : (childTotal > 0 ? childTotal / 1.25 : 0);
      var powderThreshold = _meatRef > 0 ? Math.round(100 * (_meatRef / 12.5)) : 100;

      prodStageEdit.lines.forEach(function(line, idx){
        if (line.amount == null) line.amount = suggestG(line);
        const row = div(''); row.style.cssText = 'background:#f9fdf8;border:1px solid #d0e8c8;border-radius:8px;padding:8px 10px;';

    }
    if (t === 'fatcalc' && (prodForm.children || []).some(function(c){ return c.minced || c.stuffed || (c.recipe && c.recipe.lines && c.recipe.lines.length) || c.stuffCount; })) {
      showToast('This run already has children in progress — start a new run for this batch instead (Back → Start a new production run).'); return;
    }
    if (t === 'recipe') {
      if (!prodForm.children || prodForm.children.length === 0) { showToast('Do the Fat calculator first to create children'); return; }
      if (!prodStageEdit.recipeName || !prodStageEdit.recipeName.trim()) { showToast('Give the recipe a name'); return; }
    }
    if (t === 'stuff_hang') {
      const hasAny = (prodStageEdit.count && prodStageEdit.count > 0) || (prodStageEdit.notes && prodStageEdit.notes.trim()) || prodStageEdit.skinSize || prodStageEdit.unitGrams || prodStageEdit.onMachineG;
      if (!hasAny) { showToast('Pick a skin size or add a note — piece count can come later'); return; }
    }
    prodForm.stages = prodForm.stages || [];
    const toSave = Object.assign({}, prodStageEdit);
    delete toSave.picker;
    if (!toSave.savedAt) toSave.savedAt = new Date().toISOString();  // real moment saved, for audit (separate from chosen date)
    var _dedupe = {recipe:1, stuff_hang:1, mix:1};
    if (_dedupe[t] && toSave.childLetter) {
      var _ix = prodForm.stages.findIndex(function(st){ return st.type===t && st.childLetter===toSave.childLetter; });
      if (_ix >= 0) { prodForm.stages[_ix] = toSave; } else { prodForm.stages.push(toSave); }
    } else { prodForm.stages.push(toSave); }
    // Fat calculator declares the children (divisions) for this run.
    if (t === 'fatcalc') {
      const n = toSave.childCount || 1;
      const m = toSave.meatKg || 0, fat = toSave.fatKg || 0, total = toSave.totalKg || 0;
      const childMeat = Math.round((m / n) * 100) / 100;
      const childFat = Math.round((fat / n) * 100) / 100;
      const childTotal = Math.round((total / n) * 100) / 100;
      const existing = prodForm.children || [];
      const offset = childLetterOffset(prodForm.batchCode, prodEditId);
      const kids = [];
      for (let i = 0; i < n; i++) {
        const letter = String.fromCharCode(65 + offset + i);
        const prev = existing.find(function(c){ return c.letter === letter; }) || {};
        kids.push({
          letter: letter,
          code: (prodForm.batchCode || '') + letter,
          meatKg: childMeat, fatKg: childFat, totalKg: childTotal,
          recipe: prev.recipe || null, saltGrams: prev.saltGrams, saltPercent: prev.saltPercent,
          minced: prev.minced || false, stuffed: prev.stuffed || null
        });
      }
      prodForm.children = kids;
    }
    if (t === 'recipe' && prodForm.children) {
      const ch = prodForm.children.find(function(c){ return c.letter === toSave.childLetter; });
      if (ch) {
        // store recipe with the final (possibly edited) amounts and the ratio definitions
        ch.recipe = {
          name: toSave.recipeName,
          lines: (toSave.lines || []).filter(function(l){ return !recipeLineIsBlank(l); }).map(function(l){ return {name:l.name, type:l.type, value:l.value, unit:l.unit, amount:l.amount, refAmt:l.refAmt, refMix:l.refMix}; })
        };
        const saltLine = (toSave.lines || []).find(function(l){ return l.name && l.name.toLowerCase() === 'salt'; });
        if (saltLine) { ch.saltGrams = saltLine.amount; }
      }
    }
    if (t === 'mince' && prodForm.children && toSave.childWork) {
      // Save each child's salt + mark salt added on mince day. If the child already
      // has a recipe, pre-tick (and set the amount of) its Salt line for next session.
      prodForm.children.forEach(function(ch){
        const cw = toSave.childWork[ch.letter];
        if (!cw) return;
        ch.minced = !!cw.minced;
        ch.mixed = !!cw.mixed;
        if (cw.salted && cw.saltGrams) {
          ch.saltGrams = cw.saltGrams;
          ch.saltAddedDate = toSave.date || today();
          if (ch.recipe && ch.recipe.lines) {
            const sLine = ch.recipe.lines.find(function(l){ return l.name && l.name.toLowerCase() === 'salt'; });
            if (sLine) { sLine.amount = cw.saltGrams; sLine.addedDate = ch.saltAddedDate; }
          }
        }
      });
    }
    if (t === 'mix' && prodForm.children) {
      var _mc = prodForm.children.find(function(c){ return c.letter === toSave.childLetter; });
      if (_mc && toSave.mixDone) { _mc.mixed = true; _mc.mixedDate = toSave.date || today(); }
    }
    if (t === 'stuff_hang' && prodForm.children) {
      var _sc = prodForm.children.find(function(c){ return c.letter === toSave.childLetter; });
      if (_sc) { _sc.stuffed = toSave.date || today(); _sc.stuffSkin = toSave.skinSize || null; _sc.stuffFinish = toSave.finishDate || null; _sc.stuffCount = toSave.count || 0; }
    }
    if (t === 'stuff_hang' && toSave.finishDate) {
      // Put the estimated dry/vac-pack date on the to-do list (one task per batch+child;
      // re-saving updates it rather than duplicating).
      const ch = (prodForm.children || []).find(function(c){ return c.letter === toSave.childLetter; });
      const childCode = ch ? ch.code : (prodForm.batchCode || '');
      const flav = (ch && ch.recipe && ch.recipe.name) ? ' ' + ch.recipe.name : '';
      const taskId = 'vac_' + (prodForm.batchCode || '') + (toSave.childLetter || '');
      const text = '🌭 Vac pack ' + childCode + flav + ' — est. ready ' + fmtDate(toSave.finishDate);
      const existing = generalTasks.find(function(g){ return g.id === taskId; });
      if (existing) { existing.text = text; existing.dueDate = toSave.finishDate; existing.done = false; }
      else { generalTasks.push({id: taskId, text: text, addedDate: today(), dueDate: toSave.finishDate, done: false, kind: 'fsa', _vacpack: true}); }
    }
    if (t === 'mix' && toSave.childLetter) {
      // Move FORWARD to Stuff & hang for the same child rather than back to the board.
      prodStageEdit = null;
      productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
      saveData();
      showToast('Saved');
      var _fresh = productionRecords.find(function(r){ return r.id === prodEditId; });
      if (_fresh) prodForm = JSON.parse(JSON.stringify(_fresh));
      prodStageEdit = {type:'stuff_hang', date:today(), notes:'', childLetter:toSave.childLetter};
      renderProductionForm();
    } else {
      prodStageEdit = null;
      saveAndStay();
    }
  });
  saveBar.appendChild(saveBtn);
  const cancelBtn = btn('', 'Cancel', function(){ prodStageEdit = null; renderProductionForm(); });
  saveBar.appendChild(cancelBtn);
  v.appendChild(saveBar);
}

function saveAndStay() {
  if (!prodEditId) return;
  productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
  saveData();
  showToast('Saved');
  const fresh = productionRecords.find(function(r){ return r.id === prodEditId; });
  if (fresh) prodForm = JSON.parse(JSON.stringify(fresh));
  renderProductionForm();
}

function saveAndReturn() {
  if (!prodEditId) { prodForm = null; renderProduction(); return; }
  productionRecords = productionRecords.map(function(r){ return r.id === prodEditId ? Object.assign({}, prodForm) : r; });
  saveData();
  showToast('Saved');
  prodForm = null; prodEditId = null; prodStageEdit = null;
  renderProduction();
}

function nextFridayString() {
  const d = new Date();
  const day = d.getDay();
  const daysToFri = (5 - day + 7) % 7;
  d.setDate(d.getDate() + (daysToFri === 0 ? 7 : daysToFri));
  return d.toISOString().split('T')[0];
}

  const sm = statusMap[r.status] || statusMap.building;
