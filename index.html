    const delBtn = btn('btn-sm btn-danger', 'Delete list', function(){
      if (!confirm('Delete this cleaning list? This cannot be undone.')) return;
      periodicCleans = periodicCleans.filter(function(r){ return r.id !== cleanEditId; });
      saveData();
      showToast('List deleted');
      cleanForm = null; cleanEditId = null;
      renderPeriodicCleans();
    });
    delBtn.style.marginLeft = 'auto';
    saveBar.appendChild(delBtn);
  }
  v.appendChild(saveBar);
}

function persistClean() {
  const rec = Object.assign({}, cleanForm, {id: cleanEditId || cleanForm.id || uid()});
  if (cleanEditId) {
    periodicCleans = periodicCleans.map(function(r){ return r.id === cleanEditId ? rec : r; });
  } else {
    periodicCleans.push(rec);
    cleanEditId = rec.id;
  }
  saveData();
}

function renderCleanRunMode() {
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');

  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Cleaning list' + (cleanForm.staffName ? ' · ' + cleanForm.staffName : '')));
  const backBtn = btn('', '← Back', function(){ cleanForm = null; cleanEditId = null; cleanRunMode = false; renderPeriodicCleans(); });
  hdr.appendChild(backBtn);
  v.appendChild(hdr);

  // Date banner
  const banner = div('');
  banner.style.cssText = 'background:#e8f4e3;border:1px solid #b8d9b0;border-radius:8px;padding:10px 14px;margin-bottom:1rem;';
  banner.appendChild(el('p', {style:'font-size:15px;font-weight:600;color:#27500a;margin:0;'}, fmtDate(cleanForm.forDate)));
  if (cleanForm.notes) {
    banner.appendChild(el('p', {style:'font-size:12px;color:#666;margin:4px 0 0;font-style:italic;'}, '"' + cleanForm.notes + '"'));
  }
  v.appendChild(banner);

  // Progress
  const total = (cleanForm.jobs || []).length;
  const doneCount = (cleanForm.jobs || []).filter(function(j){ return j.done; }).length;
  const progressEl = document.createElement('p');
  progressEl.style.cssText = 'font-size:13px;font-weight:500;color:#27500a;text-align:center;margin:0 0 1rem;';
  progressEl.textContent = doneCount + ' of ' + total + ' jobs done';
  v.appendChild(progressEl);

  // Toggle build/run mode for Robert if he opened a ready list
  const modeRow = div('');
  modeRow.style.cssText = 'text-align:right;margin-bottom:8px;';
  const editBtn = document.createElement('button');
  editBtn.style.cssText = 'font-size:11px;color:#888;background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;cursor:pointer;';
  editBtn.textContent = '✎ Edit list';
  editBtn.addEventListener('click', function(){
    cleanRunMode = false;
    renderCleanForm();
  });
  modeRow.appendChild(editBtn);
  v.appendChild(modeRow);

  // Jobs as collapsible headings
  (cleanForm.jobs || []).forEach(function(job, idx) {
    const jCard = div('card');
    jCard.style.cssText = 'margin-bottom:8px;padding:0;overflow:hidden;' + (job.done ? 'background:#eaf3de;' : '');

    // Heading row — big tick
    const head = document.createElement('div');
    head.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;';
    const tick = document.createElement('input');
    tick.type = 'checkbox';
    tick.checked = !!job.done;
    tick.style.cssText = 'width:26px;height:26px;flex-shrink:0;accent-color:#3a6b2a;cursor:pointer;';
    tick.addEventListener('change', function(e) {
      job.done = e.target.checked;
      // When heading is ticked, mark all subtasks as done (auto). Untick = unmark all.
      (job.subtasks || []).forEach(function(st){ st.done = e.target.checked; });
      if (cleanForm.status === 'ready') cleanForm.status = 'in_progress';
      // Recalc completion
      const allDone = (cleanForm.jobs || []).every(function(j){ return j.done; });
      if (allDone) cleanForm.status = 'completed';
      persistClean();
      renderCleanRunMode();
    });
    tick.addEventListener('click', function(e){ e.stopPropagation(); });
    head.appendChild(tick);
    const titleSpan = document.createElement('span');
    titleSpan.style.cssText = 'flex:1;font-size:15px;font-weight:600;color:' + (job.done ? '#888;text-decoration:line-through;' : '#1a1a1a;');
    titleSpan.textContent = job.title;
    head.appendChild(titleSpan);
    const expandBtn = document.createElement('span');
    expandBtn.style.cssText = 'font-size:11px;color:#888;flex-shrink:0;';
    expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▼' : '';
    head.appendChild(expandBtn);

    // Detail panel — collapsed by default
    const detail = document.createElement('div');
    detail.style.cssText = 'display:none;background:#f9fdf8;border-top:1px solid #E7DFCE;padding:10px 16px 14px;';
    (job.subtasks || []).forEach(function(st){
      const stRow = div('');
      stRow.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:5px 0;';
      const stChk = document.createElement('input');
      stChk.type = 'checkbox';
      stChk.checked = !!st.done;
      stChk.style.cssText = 'width:18px;height:18px;flex-shrink:0;accent-color:#3a6b2a;cursor:pointer;margin-top:2px;';
      stChk.addEventListener('change', function(e){
        st.done = e.target.checked;
        // If all subtasks done, auto-tick heading
        const allSubDone = job.subtasks.every(function(x){ return x.done; });
        job.done = allSubDone;
        if (cleanForm.status === 'ready') cleanForm.status = 'in_progress';
        const allDone = (cleanForm.jobs || []).every(function(j){ return j.done; });
        if (allDone) cleanForm.status = 'completed';
        persistClean();
        renderCleanRunMode();
      });
      stChk.addEventListener('click', function(e){ e.stopPropagation(); });
      const stTxt = document.createElement('span');
      const isHL = (job.highlights || []).some(function(h){ return st.text.toLowerCase().includes(h.toLowerCase()); });
      stTxt.style.cssText = 'font-size:13px;flex:1;color:' + (isHL ? '#a83400' : (st.done ? '#888;text-decoration:line-through' : '#1a1a1a')) + ';' + (isHL ? 'font-weight:600;' : '');
      stTxt.textContent = st.text + (isHL ? ' ⚠' : '');
      stRow.appendChild(stChk); stRow.appendChild(stTxt);
      detail.appendChild(stRow);
    });

    head.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (detail.style.display === 'none') {
        detail.style.display = 'block';
        expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▲' : '';
      } else {
        detail.style.display = 'none';
        expandBtn.textContent = (job.subtasks || []).length > 0 ? 'Details ▼' : '';
      }
    });

    jCard.appendChild(head);
    if ((job.subtasks || []).length > 0) jCard.appendChild(detail);
    v.appendChild(jCard);
  });

  // Submit completed button
  if (cleanForm.status !== 'completed') {
    const submitBar = div('save-bar');
    submitBar.style.marginTop = '1.5rem';
    const submitBtn = btn('btn-primary', '✓ Submit as completed', function(){
      const total = (cleanForm.jobs || []).length;
      const doneCount = (cleanForm.jobs || []).filter(function(j){ return j.done; }).length;
      if (doneCount < total) {
        if (!confirm(doneCount + ' of ' + total + ' jobs ticked. Submit anyway?')) return;
      }
      cleanForm.status = 'completed';
      cleanForm.completedDate = today();
      persistClean();
      showToast('Cleaning list completed');
      cleanForm = null; cleanEditId = null; cleanRunMode = false;
      renderPeriodicCleans();
    });
    submitBar.appendChild(submitBtn);
    v.appendChild(submitBar);
  } else {
    const doneBanner = div('');
    doneBanner.style.cssText = 'background:#eaf3de;border:1px solid #b8d9b0;border-radius:8px;padding:14px;margin-top:1.5rem;text-align:center;';
    doneBanner.appendChild(el('p', {style:'font-size:14px;font-weight:600;color:#27500a;margin:0;'}, '✓ Completed' + (cleanForm.completedDate ? ' on ' + fmtDate(cleanForm.completedDate) : '')));
    v.appendChild(doneBanner);
  }
}

function renderCompletedCleansList() {
  currentView = 'clean';
  hideAllExceptClean();
  const v = document.getElementById('view-clean');
  v.innerHTML = '';
  renderTabs('clean');
  const hdr = div('header-bar');
  hdr.appendChild(el('h2', {style:'font-size:18px;font-weight:600;margin:0;'}, 'Completed cleaning lists'));
  const backBtn = btn('', '← Back', renderPeriodicCleans);
  hdr.appendChild(backBtn);
  v.appendChild(hdr);
  const done = periodicCleans.filter(function(r){ return r.status === 'completed'; }).sort(function(a,b){ return (b.completedDate||b.forDate||'').localeCompare(a.completedDate||a.forDate||''); });
  if (done.length === 0) {
    const empty = div('empty-state');
    empty.appendChild(p('', 'No completed lists yet.'));
    v.appendChild(empty);
    return;
  }
  done.forEach(function(r){ v.appendChild(cleanCardSummary(r)); });
}

// ── Session draft: auto-save in-progress entry + last screen, restore on reopen ──
const SESSION_KEY = 'fsa_session_v1';
function saveSession(){
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      v: currentView, form: form, dailyForm: dailyForm,
      prodForm: prodForm, prodEditId: prodEditId, prodStageEdit: prodStageEdit,
      makeChildLetter: makeChildLetter, dcForm: dcForm, ts: Date.now()
    }));
  } catch (e) {}
}
function sessionRouteTo(v){
  switch (v) {
    case 'prod': if (prodForm) renderProductionForm(); else renderProduction(); break;
    case 'daily': renderDailyHome(); break;
    case 'form': if (form) renderForm(); else renderList(); break;
    case 'list-records': renderList('records'); break;
    case 'pest': renderPestControl(); break;
    case 'checks': renderDailyChecks(); break;
    case 'clean': renderPeriodicCleans(); break;
    case 'delivery': case 'delivery-form': renderDeliveryList(); break;
    case 'wetmeat': renderWetMeat(); break;
    case 'venison': (typeof renderVenison === 'function' ? renderVenison() : renderList()); break;
    case 'manage': renderManage(); break;
    default: renderList();
  }
}
function restoreSession(){
  try {
    var s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!s || !s.v) return false;
    form = s.form || null;
    dailyForm = s.dailyForm || null;
    prodForm = s.prodForm || null;
    prodEditId = s.prodEditId || null;
    prodStageEdit = s.prodStageEdit || null;
    makeChildLetter = s.makeChildLetter || null;
    dcForm = s.dcForm || null;
    currentView = s.v;
    sessionRouteTo(s.v);
    return true;
  } catch (e) { return false; }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadData();
  migrateShortCodes();
  checkAndFixSeasons();
  if (!restoreSession()) renderList();
  setInterval(saveSession, 2500);
  document.addEventListener('visibilitychange', function(){ if (document.hidden) saveSession(); });
  window.addEventListener('pagehide', saveSession);
  window.addEventListener('beforeunload', saveSession);
})();
</script>
